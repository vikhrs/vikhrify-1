<!DOCTYPE html>
<html lang="ru">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vikhrify</title>
    <style>
        body { margin:0; background:#000; color:#fff; font-family:sans-serif; }
        .view { display:none; padding:20px; } .view.active { display:block; }
        .btn { width:100%; padding:20px; margin:10px 0; border-radius:15px; border:none; background:#007bff; color:#fff; font-size:18px; }
        .input { width:100%; padding:20px; margin:10px 0; border-radius:15px; border:1px solid #333; background:#111; color:#fff; box-sizing:border-box; }
        .nav { position:fixed; bottom:0; width:100%; display:flex; background:#111; padding:10px 0; }
        .nav button { flex:1; background:none; border:none; color:#fff; font-size:16px; }
        #burger { position:fixed; left:-100%; top:0; width:80%; height:100%; background:#1a1a1a; transition:0.3s; padding:20px; z-index:99; }
        #burger.open { left:0; }
    </style>
</head>
<body>
    <div id="auth">
        <h1 style="text-align:center">Добро пожаловать в Vikhrify!</h1>
        <input id="n" class="input" placeholder="Имя">
        <input id="u" class="input" placeholder="Юзернейм (англ)">
        <input id="p" class="input" type="password" placeholder="Пароль">
        <button class="btn" onclick="auth('reg')">Регистрация</button>
        <button class="btn" style="background:#444" onclick="auth('login')">Вход</button>
    </div>

    <div id="app" style="display:none">
        <button onclick="document.getElementById('burger').classList.add('open')">≡ Меню</button>
        <div id="burger">
            <button class="btn" onclick="document.getElementById('burger').classList.remove('open')">✕ Закрыть</button>
            <button class="btn" onclick="show('pub')">📤 Опубликовать</button>
            <button class="btn" onclick="addAcc()">+ Добавить аккаунт</button>
            <button class="btn" style="background:#800" onclick="logout()">🚪 Выход</button>
        </div>
        <div id="v-feed" class="view active"><h2 style="text-align:center">Vikhrify</h2><div id="feed"></div></div>
        <div id="v-chats" class="view"><h3>Мои чаты:</h3><div id="chat-list"></div></div>
        <div id="v-profile" class="view">
            <h2 id="p-name"></h2>
            <p id="p-user"></p>
            <button class="btn" onclick="edit()">Изменить профиль</button>
            <h3>Мои посты:</h3><div id="my-posts"></div>
        </div>
        <nav class="nav">
            <button onclick="show('feed')">🏠 Лента</button>
            <button onclick="show('chats')">💬 Чаты</button>
            <button onclick="show('profile')">👤 Профиль</button>
        </nav>
    </div>

    <script>
        setInterval(async () => {
            const r = await fetch('/api/data');
            const d = await r.json();
            // Тут логика обновления ленты и чатов
        }, 3000);

        async function auth(t) {
            const r = await fetch('/api/auth', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:document.getElementById('u').value, password:document.getElementById('p').value, name:document.getElementById('n').value, type:t}) });
            if(r.ok) { localStorage.setItem('user', document.getElementById('u').value); location.reload(); }
            else alert('Ошибка! Юзернейм занят или неверный пароль.');
        }
        function show(v) { document.querySelectorAll('.view').forEach(e=>e.classList.remove('active')); document.getElementById('v-'+v).classList.add('active'); }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
