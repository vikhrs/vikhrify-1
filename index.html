<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vikhrify</title>
    <link rel="manifest" href="/manifest.json">
    <style>
        :root { --bg: #ffffff; --card: #f8f9fa; --text: #000; --accent: #007bff; --border: #ddd; }
        [data-theme="dark"] { --bg: #0d1117; --card: #161b22; --text: #e6edf3; --accent: #58a6ff; --border: #30363d; }
        body { margin:0; font-family: sans-serif; background: var(--bg); color: var(--text); overflow-x:hidden; }
        .hidden { display:none !important; }
        header { position:fixed; top:0; width:100%; height:60px; background:var(--card); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 15px; z-index:1000; box-sizing:border-box; }
        #sidebar { position:fixed; top:0; left:-100%; width:280px; height:100%; background:var(--card); border-right:1px solid var(--border); transition:0.3s; z-index:2000; padding:20px; box-sizing:border-box; overflow-y:auto; }
        #sidebar.active { left:0; }
        .menu-item { padding:12px; border-radius:10px; cursor:pointer; font-weight:bold; display:flex; align-items:center; gap:10px; }
        .main-container { margin-top:70px; padding:15px; max-width:600px; margin:70px auto 0; }
        .post { background:var(--card); padding:15px; border-radius:15px; margin-bottom:15px; border:1px solid var(--border); }
        .avatar { width:45px; height:45px; border-radius:50%; object-fit:cover; }
        #auth-page { position:fixed; inset:0; background:var(--bg); z-index:10000; display:flex; align-items:center; justify-content:center; }
        .auth-card { background:var(--card); padding:30px; border-radius:20px; width:90%; max-width:350px; border:1px solid var(--border); text-align:center; }
        input, button { width:100%; padding:12px; margin:8px 0; border-radius:10px; border:1px solid var(--border); background:var(--bg); color:var(--text); box-sizing:border-box; }
        button { background:var(--accent); color:#fff; border:none; font-weight:bold; cursor:pointer; }
        .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1500; display:none; }
        .overlay.active { display:block; }
    </style>
</head>
<body data-theme="dark">

<div id="auth-page">
    <div class="auth-card">
        <h1>Vikhrify</h1>
        <div id="reg-box" class="hidden"><input id="auth-name" placeholder="Имя"></div>
        <input id="auth-u" placeholder="Username">
        <input id="auth-p" type="password" placeholder="Пароль">
        <button onclick="auth()">Войти / Создать</button>
        <p onclick="toggleAuth()" id="auth-t" style="cursor:pointer; font-size:14px; color:var(--accent)">Регистрация</p>
    </div>
</div>

<header>
    <div onclick="toggleMenu()" style="font-size:24px; cursor:pointer">☰</div>
    <div style="font-weight:bold; font-size:20px">Vikhrify</div>
    <div onclick="toggleTheme()" style="font-size:20px; cursor:pointer">🌓</div>
</header>

<div class="overlay" onclick="toggleMenu()"></div>
<div id="sidebar">
    <div style="font-size:24px; margin-bottom:20px" onclick="toggleMenu()">✕</div>
    <div class="menu-item" onclick="showSection('feed')">🏠 Главная</div>
    <div class="menu-item" onclick="showSection('search')">🔍 Поиск</div>
    <div class="menu-item" onclick="showSection('shop')">🛒 Магазин</div>
    <div class="menu-item" onclick="showSection('profile')">👤 Профиль</div>
    <hr style="border:0.5px solid var(--border); margin:20px 0;">
    <div style="font-size:12px; color:var(--accent); margin-left:10px">АККАУНТЫ</div>
    <div id="accounts-list"></div>
    <div class="menu-item" onclick="addAcc()" style="color:var(--accent)">+ Добавить аккаунт</div>
    <div class="menu-item" onclick="logout()" style="color:#ff4444">🚪 Выйти</div>
</div>

<div class="main-container">
    <div id="sec-feed" class="section"><h3>Для вас</h3><div id="feed-list"></div></div>
    <div id="sec-search" class="section hidden"><input id="s-in" placeholder="Поиск..." oninput="search()"><div id="s-res"></div></div>
    <div id="sec-shop" class="section hidden">
        <h2>Магазин VXR</h2>
        <div class="post">100 VXR - 100 руб <button onclick="window.open('https://vxr-buy.tilda.ws/')">Купить на сайте</button></div>
        <div class="post">10 000 VXR - 10 000 руб <button onclick="window.open('https://vxr-buy.tilda.ws/')">Купить на сайте</button></div>
    </div>
    <div id="sec-profile" class="section hidden">
        <div style="text-align:center; position:relative">
            <img id="p-img" class="avatar" style="width:100px; height:100px">
            <div style="position:absolute; top:80px; right:38%; background:var(--accent); border-radius:50%; width:25px; cursor:pointer">+</div>
            <h2 id="p-n"></h2><p id="p-u"></p>
            <button onclick="document.getElementById('e-b').classList.toggle('hidden')">Редактировать</button>
        </div>
        <div id="e-b" class="hidden"><input id="e-n" placeholder="Новое имя"><button onclick="saveP()">Сохранить</button></div>
        <h3>Мои посты</h3><div id="my-p"></div>
    </div>
</div>

<script>
let accounts = JSON.parse(localStorage.getItem('vxr_accs')) || [];
let user = JSON.parse(localStorage.getItem('user'));
let isLogin = true;

function toggleAuth() { isLogin = !isLogin; document.getElementById('reg-box').classList.toggle('hidden', isLogin); }

async function auth() {
    const username = document.getElementById('auth-u').value;
    const password = document.getElementById('auth-p').value;
    const name = document.getElementById('auth-name').value;
    const r = await fetch(isLogin ? '/api/login' : '/api/register', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({username, password, name})
    });
    const d = await r.json();
    if(d.success) {
        if(!isLogin) alert(d.message);
        if(!accounts.find(a => a.username === d.user.username)) { accounts.push(d.user); localStorage.setItem('vxr_accs', JSON.stringify(accounts)); }
        localStorage.setItem('user', JSON.stringify(d.user)); location.reload();
    } else alert(d.error);
}

function renderAccs() {
    document.getElementById('accounts-list').innerHTML = accounts.map(a => `
        <div class="menu-item" onclick="switchAcc('${a.username}')" style="${a.username===user.username?'border-left:3px solid var(--accent)':''}">
            <img src="${a.avatar}" style="width:20px; height:20px; border-radius:50%">${a.name}
        </div>`).join('');
}
function switchAcc(un) { localStorage.setItem('user', JSON.stringify(accounts.find(a=>a.username===un))); location.reload(); }
function addAcc() { document.getElementById('auth-page').classList.remove('hidden'); toggleMenu(); }
function logout() { 
    accounts = accounts.filter(a=>a.username!==user.username); localStorage.setItem('vxr_accs', JSON.stringify(accounts));
    if(accounts.length>0) localStorage.setItem('user', JSON.stringify(accounts[0])); else localStorage.removeItem('user');
    location.reload();
}
function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); document.querySelector('.overlay').classList.toggle('active'); }
function toggleTheme() { document.body.dataset.theme = document.body.dataset.theme==='dark'?'light':'dark'; }
function showSection(id) { 
    document.querySelectorAll('.section').forEach(s=>s.classList.add('hidden')); 
    document.getElementById('sec-'+id).classList.remove('hidden'); 
    if(id==='profile') {
        document.getElementById('p-img').src = user.avatar;
        document.getElementById('p-n').innerText = user.name;
        document.getElementById('p-u').innerText = '@'+user.username;
    }
    toggleMenu(); 
}

if(user) { document.getElementById('auth-page').classList.add('hidden'); renderAccs(); }
</script>
</body>
</html>
