<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Vikhrify</title>
    <style>
        body { margin:0; background:#000; color:#fff; font-family:sans-serif; }
        header { display:flex; align-items:center; height:50px; border-bottom:1px solid #333; }
        .logo { margin: 0 auto; font-weight:bold; }
        #sidebar { position:fixed; left:-100%; top:0; width:200px; height:100%; background:#111; padding:20px; z-index:100; transition:0.3s; }
        #sidebar.active { left:0; }
        .section { padding:20px; }
        .hidden { display:none; }
        .post { border:1px solid #333; padding:10px; margin:10px 0; cursor:pointer; }
    </style>
</head>
<body>

<header>
    <div onclick="document.getElementById('sidebar').classList.add('active')" style="margin-left:15px; cursor:pointer">☰</div>
    <div class="logo">Vikhrify</div>
    <div style="width:30px"></div>
</header>

<div id="sidebar">
    <div onclick="document.getElementById('sidebar').classList.remove('active')" style="cursor:pointer">✕</div>
    <div onclick="show('feed')">Лента</div>
    <div onclick="show('search')">Поиск</div>
    <div onclick="show('chats')">Чаты</div>
    <div onclick="show('profile')">Профиль</div>
    <hr>
    <div id="acc-list"></div>
    <div onclick="logout()" style="color:red; margin-top:20px; cursor:pointer">Выйти</div>
</div>

<div id="main">
    <div id="sec-feed" class="section">
        <div id="feed-list"></div>
    </div>
    
    <div id="sec-profile" class="section hidden">
        <h2 id="p-name"></h2>
        <button id="btn-follow" onclick="toggleFollow()">Подписаться</button>
        <button onclick="openChat()">Написать</button>
    </div>

    <div id="sec-search" class="section hidden">
        <input id="q" oninput="doSearch()" placeholder="Поиск...">
        <div id="res"></div>
    </div>
</div>

<script>
let user = JSON.parse(localStorage.getItem('user'));
let currentView = null;

async function viewProfile(un) {
    const r = await fetch('/api/user?username='+un);
    currentView = await r.json();
    show('profile');
    document.getElementById('p-name').innerText = currentView.username;
    document.getElementById('btn-follow').innerText = user.following.includes(un) ? 'Отписаться' : 'Подписаться';
}

async function toggleFollow() {
    await fetch('/api/follow', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({myId:user.id, targetUsername:currentView.username})});
    location.reload();
}

function openChat() { 
    show('chats'); 
    document.getElementById('to').value = currentView.username; 
}

function show(id) {
    document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
    document.getElementById('sec-'+id).classList.remove('hidden');
    document.getElementById('sidebar').classList.remove('active');
}

function logout() { location.href = '/logout'; } // или твоя логика выхода
</script>
</body>
</html>
