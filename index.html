<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вихрифай</title>
  <style>
    body { margin:0; font-family:Arial,sans-serif; background:#111; color:#eee; }
    #auth { position:fixed; inset:0; background:#000c; display:flex; align-items:center; justify-content:center; z-index:100; }
    #auth.hidden { display:none; }
    .card { background:#222; padding:24px; border-radius:12px; width:90%; max-width:400px; }
    input, button, textarea { width:100%; padding:12px; margin:8px 0; border-radius:6px; border:none; font-size:1rem; }
    button { background:#0284c7; color:white; cursor:pointer; }
    .premium-btn { background:#7c3aed; margin:12px 0; }
    nav { position:fixed; bottom:0; left:0; right:0; background:#1a1a1a; display:flex; }
    nav button { flex:1; padding:16px; background:none; border:none; color:#aaa; cursor:pointer; font-size:0.9rem; }
    nav button.active { color:#fff; background:#0284c7; }
    .section { display:none; padding:80px 16px 100px; }
    .section.active { display:block; }
    .post { background:#1e1e1e; padding:16px; margin:12px 0; border-radius:8px; }
    .post img { max-width:100%; border-radius:8px; margin-top:8px; }
    .avatar { width:60px; height:60px; border-radius:50%; object-fit:cover; border:2px solid #0284c7; }
    .verified { font-size:1.2em; margin-left:4px; }
    .blue { color:#1da1f2; } /* ✔ */
    .yellow { color:#ffd700; } /* ★ */
    .red { color:#ff0000; } /* ♦ */
    .password-wrapper { position: relative; }
    .password-wrapper input { padding-right: 40px; }
    .password-toggle { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #aaa; }
    #chat-messages { max-height: 300px; overflow-y: auto; background: #1e1e1e; padding: 12px; border-radius: 8px; margin-top: 12px; }
    .message { margin: 8px 0; padding: 8px; border-radius: 6px; }
    .message.sent { background: #0284c7; align-self: flex-end; }
    .message.received { background: #333; }
  </style>
</head>
<body>

<div id="auth">
  <div class="card">
    <h2 style="text-align:center">Добро пожаловать в Вихрифай</h2>
    <button id="show-register">Зарегистрироваться</button>
    <button id="show-login">Войти</button>
    <div id="reg-form">
      <input id="reg-name" placeholder="Имя">
      <input id="reg-username" placeholder="Юзернейм">
      <div class="password-wrapper">
        <input id="reg-password" type="password" placeholder="Пароль">
        <span class="password-toggle" onclick="togglePassword('reg-password')">👁</span>
      </div>
      <button onclick="register()">Зарегистрироваться</button>
    </div>
    <div id="login-form" style="display:none;">
      <input id="login-username" placeholder="Юзернейм">
      <div class="password-wrapper">
        <input id="login-password" type="password" placeholder="Пароль">
        <span class="password-toggle" onclick="togglePassword('login-password')">👁</span>
      </div>
      <button onclick="login()">Войти</button>
    </div>
    <div id="auth-msg" style="margin-top:12px; text-align:center; min-height:20px;"></div>
    <p id="ref-info" style="color: lime;"></p>
  </div>
</div>

<div id="app" style="display:none;">
  <!-- Чаты -->
  <div id="chats" class="section">
    <h2>Чаты</h2>
    <input id="search-username" placeholder="Поиск по юзернейму" oninput="searchUsers()">
    <div id="user-list"></div>
    <div id="chat-window" style="display:none;">
      <h3>Чат с <span id="chat-with"></span></h3>
      <div id="chat-messages"></div>
      <textarea id="message-text" placeholder="Сообщение..." rows="2"></textarea>
      <button onclick="sendMessage()">Отправить</button>
    </div>
  </div>

  <!-- Лента -->
  <div id="feed" class="section">
    <h2>Лента</h2>
    <textarea id="post-text" placeholder="Что нового?" rows="3"></textarea>
    <input type="file" id="post-photo" accept="image/*">
    <button onclick="publishPost()">Опубликовать</button>
    <button onclick="showSearchPeople()">Поиск людей</button>
    <div id="search-people" style="display:none;">
      <input id="people-search" placeholder="Юзернейм" oninput="searchUsersForFeed()">
      <div id="people-list"></div>
    </div>
    <div id="posts-list"></div>
  </div>

  <!-- Купить VXR -->
  <div id="buy" class="section">
    <h2>Купить VXR</h2>
    <p>1 VXR = 1 рубль. Выберите пакет:</p>
    <div id="buy-buttons"></div>
  </div>

  <!-- Профиль -->
  <div id="profile" class="section">
    <h2>Профиль</h2>
    <img id="my-avatar" class="avatar" src="https://via.placeholder.com/60">
    <p>
      <input type="file" id="avatar-upload" accept="image/*" onchange="changeAvatar()" style="display:none;">
      <button onclick="document.getElementById('avatar-upload').click()">Сменить аватарку</button>
    </p>
    <p>Имя: <span id="my-name"></span> <button onclick="editName()">Изменить</button></p>
    <p>Юзернейм: @<span id="my-username"></span></p>
    <p>Баланс: <span id="my-balance">0</span> VXR</p>
    <p>Премиум: <span id="my-premium">нет</span></p>
    <button class="premium-btn" onclick="buyPremium('blue')">Купить синюю галочку (299 VXR)</button>
    <button class="premium-btn" onclick="buyPremium('yellow')">Купить жёлтую галочку (499 VXR)</button>
    <p>Галочка: <span id="my-verified">—</span></p>
    <button onclick="generateReferralLink()">Поделиться (реферальная ссылка)</button>
    <p id="referralLink" style="word-break: break-all; display:none;"></p>
    <h3>Мои посты</h3>
    <div id="my-posts"></div>
  </div>

  <nav>
    <button onclick="show('chats')">Чаты</button>
    <button class="active" onclick="show('feed')">Лента</button>
    <button onclick="show('buy')">Купить VXR</button>
    <button onclick="show('profile')">Профиль</button>
  </nav>
</div>

<script>
let user = null;
const msg = document.getElementById('auth-msg');
let currentChatUserId = null;

// Переключение форм
document.getElementById('show-register').onclick = () => {
  document.getElementById('reg-form').style.display = 'block';
  document.getElementById('login-form').style.display = 'none';
};
document.getElementById('show-login').onclick = () => {
  document.getElementById('reg-form').style.display = 'none';
  document.getElementById('login-form').style.display = 'block';
};

// Показ пароля
function togglePassword(id) {
  const input = document.getElementById(id);
  const type = input.type === 'password' ? 'text' : 'password';
  input.type = type;
}

// Рефералка на старте
window.addEventListener('load', () => {
  const urlParams = new URLSearchParams(window.location.search);
  const ref = urlParams.get('ref');
  if (ref) {
    document.getElementById('ref-info').innerText = Приглашение от @${ref}. Зарегистрируйся и получи +50 VXR!;
  }
  const saved = localStorage.getItem('user');
  if (saved) {
    user = JSON.parse(saved);
    document.getElementById('auth').classList.add('hidden');
    document.getElementById('app').style.display = 'block';
    loadProfile();
    loadPosts();
    show('feed');
  }
});

// Регистрация
async function register() {
  msg.innerHTML = '';
  const name = document.getElementById('reg-name').value.trim();
  const username = document.getElementById('reg-username').value.trim();
  const password = document.getElementById('reg-password').value.trim();
  const urlParams = new URLSearchParams(window.location.search);
  const ref = urlParams.get('ref');

  if (!name  !username  !password) return msg.innerHTML = '<span style="color:#f33">Заполните все поля</span>';

  try {
    const r = await fetch('/api/register', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({name, username, password, ref})
    });
    const d = await r.json();
    if (d.success) {
      msg.innerHTML = '<span style="color:#0f0">Зарегистрирован! Теперь войдите. Пароль: ' + password + '</span>'; // Показ пароля после
    } else {
      msg.innerHTML = '<span style="color:#f33">' + (d.error || 'Ошибка') + '</span>';
    }
  } catch(e) {
    msg.innerHTML = '<span style="color:#f33">Ошибка сети</span>';
  }
}

// Логин
async function login() {
  msg.innerHTML = '';
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value.trim();

  if (!username || !password) return msg.innerHTML = '<span style="color:#f33">Заполните юзернейм и пароль</span>';

  try {
    const r = await fetch('/api/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({username, password})
    });
    const d = await r.json();
    if (d.success) {
      user = d.user;
      localStorage.setItem('user', JSON.stringify(user));
      document.getElementById('auth').classList.add('hidden');
      document.getElementById('app').style.display = 'block';
      loadProfile();
      loadPosts();
      show('feed');
    } else {
      msg.innerHTML = '<span style="color:#f33">' + (d.error || 'Неверно') + '</span>';
    }
  } catch(e) {
    msg.innerHTML = '<span style="color:#f33">Ошибка сети</span>';
  }
}

function show(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  if (id === 'chats' && currentChatUserId) loadMessages();
}

async function loadPosts() {
  const r = await fetch('/api/posts');
  const all = await r.json();
  document.getElementById('posts-list').innerHTML = all.map(p => 
    <div class="post">
      <div style="display:flex;gap:12px;align-items:center;">
        <img src="${p.avatar}" class="avatar">
        <div>
          <b>\( {p.name}</b> @ \){p.username}${getPremiumIcon(p.premium)}
        </div>
      </div>
      <p>${p.content}</p>
      \( {p.image ? <img src=" \){p.image}" alt="фото"> : ''}
      <small>${new Date(p.createdAt).toLocaleString()}</small>
    </div>
  ).join('');
}

function getPremiumIcon(premium) {
  if (premium === 'blue') return '<span class="verified blue">✔</span>';
  if (premium === 'yellow') return '<span class="verified yellow">★</span>';
  if (premium === 'red') return '<span class="verified red">♦</span>';
  return '';
}

async function publishPost() {
  if (!user) return alert('Войдите');
  const content = document.getElementById('post-text').value.trim();
  const file = document.getElementById('post-photo').files[0];

  if (!content) return alert('Напишите текст');

  let image = null;
  if (file) {
    const reader = new FileReader();
    reader.onload = async () => {
      image = reader.result;
      await sendPost(content, image);
    };
    reader.readAsDataURL(file);
  } else {
    await sendPost(content, null);
  }
}

async function sendPost(content, image) {
  await fetch('/api/posts', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({userId: user.id, content, image})
  });
  document.getElementById('post-text').value = '';
  document.getElementById('post-photo').value = '';
  loadPosts();
}

async function loadProfile() {
  const r = await fetch(/api/me/${user.id});
  user = await r.json();
  localStorage.setItem('user', JSON.stringify(user));

  document.getElementById('my-name').textContent = user.name;
  document.getElementById('my-username').textContent = user.username;
  document.getElementById('my-avatar').src = user.avatar;
  document.getElementById('my-balance').textContent = user.balance;
  document.getElementById('my-premium').textContent = user.premium !== 'none' ? user.premium : 'нет';
  document.getElementById('my-verified').innerHTML = getPremiumIcon(user.premium) || 'нет';

  const pr = await fetch('/api/posts');
  const my = (await pr.json()).filter(p => p.userId === user.id);
  document.getElementById('my-posts').innerHTML = my.map(p => 
    <div class="post">
      <p>${p.content}</p>
      \( {p.image ? <img src=" \){p.image}" alt="фото"> : ''}
      <small>${new Date(p.createdAt).toLocaleString()}</small>
    </div>
  ).join('');
}

function editName() {
  const newName = prompt('Новое имя:', user.name);
  if (newName && newName.trim()) {
    fetch('/api/profile', {
      method: 'PATCH',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({id: user.id, name: newName.trim()})
    }).then(() => loadProfile());
  }
}

async function changeAvatar() {
  const file = document.getElementById('avatar-upload').files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = async () => {
    const avatar = reader.result;
    await fetch('/api/profile', {
      method: 'PATCH',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({id: user.id, avatar})
    });
    loadProfile();
  };
  reader.readAsDataURL(file);
}

async function buyPremium(level) {
  const costs = {blue: 299, yellow: 499};
  const cost = costs[level];
  if (user.balance < cost) return alert('Недостаточно VXR');
  if (confirm(Купить ${level} галочку за ${cost} VXR?)) {
    await fetch('/api/buy-premium', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({userId: user.id, level})
    });
    loadProfile();
  }
}

function generateReferralLink() {
  const link = \( {window.location.origin}?ref= \){user.username};
  const elem = document.getElementById('referralLink');
  elem.innerText = Твоя реферальная ссылка: ${link}\nПоделись — +50 VXR за друга!;
  elem.style.display = 'block';
  navigator.clipboard.writeText(link).then(() => alert('Скопировано!')).catch(() => alert('Скопируй вручную: ' + link));
}

async function searchUsers() {
  const query = document.getElementById('search-username').value.trim();
  if (!query) return;
  const r = await fetch(/api/search-users?q=${query});
  const results = await r.json();
  document.getElementById('user-list').innerHTML = results.map(u => 
    <div onclick="startChat(\( {u.id}, ' \){u.username}')">
      <img src="${u.avatar}" class="avatar" style="width:40px;">
      \( {u.name} @ \){u.username}
    </div>
  ).join('');
}

function startChat(id, username) {
  currentChatUserId = id;
  document.getElementById('chat-with').textContent = @${username};
  document.getElementById('chat-window').style.display = 'block';
  loadMessages();
}

async function loadMessages() {
  const r = await fetch(/api/messages?userId=\( {user.id}&toId= \){currentChatUserId});
  const msgs = await r.json();
  document.getElementById('chat-messages').innerHTML = msgs.map(m => 
    <div class="message ${m.fromId === user.id ? 'sent' : 'received'}">
      \( {m.content} <small> \){new Date(m.createdAt).toLocaleTimeString()}</small>
    </div>
  ).join('');
  document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;
}

async function sendMessage() {
  const content = document.getElementById('message-text').value.trim();
  if (!content || !currentChatUserId) return;
  await fetch('/api/messages', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({fromId: user.id, toId: currentChatUserId, content})
  });
  document.getElementById('message-text').value = '';
  loadMessages();
}

function showSearchPeople() {
  document.getElementById('search-people').style.display = 'block';
}
  async function searchUsersForFeed() {
  const query = document.getElementById('people-search').value.trim();
  if (!query) return;
  const r = await fetch(/api/search-users?q=${query});
  const results = await r.json();
  document.getElementById('people-list').innerHTML = results.map(u => 
    <div onclick="startChat(\( {u.id}, ' \){u.username}'); show('chats')">
      <img src="${u.avatar}" class="avatar" style="width:40px;">
      \( {u.name} @ \){u.username}
    </div>
  ).join('');
}

const packs = [100, 150, 200, 250, 500, 750, 1000, 1500, 2000, 2500, 3000, 4000, 5000, 7500, 10000];
document.getElementById('buy-buttons').innerHTML = packs.map(v => 
  <button onclick="window.open('https://vxr.tilda.ws/', '_blank'); alert('Переход на оплату ${v} VXR за ${v} руб')">Купить ${v} VXR</button>
).join('');

// Старт
loadPosts();
</script>
</body>
</html>
