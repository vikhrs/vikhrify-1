<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vikhrify</title>
    <style>
        :root { --bg: #ffffff; --card: #f8f9fa; --text: #000; --accent: #007bff; --border: #ddd; }
        [data-theme="dark"] { --bg: #0d1117; --card: #161b22; --text: #e6edf3; --accent: #58a6ff; --border: #30363d; }
        body { margin:0; font-family: sans-serif; background: var(--bg); color: var(--text); overflow-x:hidden; }
        .hidden { display:none !important; }
        header { position:fixed; top:0; width:100%; height:60px; background:var(--card); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 15px; z-index:1000; box-sizing:border-box; }
        #sidebar { position:fixed; top:0; left:-100%; width:280px; height:100%; background:var(--card); border-right:1px solid var(--border); transition:0.3s; z-index:2000; padding:20px; box-sizing:border-box; overflow-y:auto; }
        #sidebar.active { left:0; }
        .menu-item { padding:12px; border-radius:10px; cursor:pointer; font-weight:bold; display:flex; align-items:center; gap:10px; }
        .main-container { margin-top:70px; padding:15px; max-width:600px; margin:70px auto 0; }
        .post { background:var(--card); padding:15px; border-radius:15px; margin-bottom:15px; border:1px solid var(--border); }
        .avatar { width:45px; height:45px; border-radius:50%; object-fit:cover; }
        #auth-page { position:fixed; inset:0; background:var(--bg); z-index:10000; display:flex; align-items:center; justify-content:center; }
        .auth-card { background:var(--card); padding:30px; border-radius:20px; width:90%; max-width:350px; border:1px solid var(--border); text-align:center; }
        input, textarea, button { width:100%; padding:12px; margin:8px 0; border-radius:10px; border:1px solid var(--border); background:var(--bg); color:var(--text); box-sizing:border-box; }
        button { background:var(--accent); color:#fff; border:none; font-weight:bold; cursor:pointer; }
        .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1500; display:none; }
        .overlay.active { display:block; }
        .lvl-badge { background: var(--accent); color: white; padding: 2px 8px; border-radius: 10px; font-size: 12px; margin-left: 5px; }
        .verified-blue::after { content:" ✔"; color:#1d9bf0; }
        .verified-yellow::after { content:" ✔"; color:#fbbc05; }
    </style>
</head>
<body data-theme="dark">

<div id="auth-page">
    <div class="auth-card">
        <h1>Vikhrify</h1>
        <div id="reg-box" class="hidden"><input id="auth-name" placeholder="Имя"></div>
        <input id="auth-u" placeholder="Username">
        <input id="auth-p" type="password" placeholder="Пароль">
        <button onclick="auth()">Войти / Создать</button>
        <p onclick="toggleAuth()" style="cursor:pointer; font-size:14px; color:var(--accent)">Регистрация</p>
    </div>
</div>

<header>
    <div onclick="toggleMenu()" style="font-size:24px; cursor:pointer">☰</div>
    <div style="font-weight:bold; font-size:20px">Vikhrify</div>
    <div onclick="toggleTheme()" style="font-size:20px; cursor:pointer">🌓</div>
</header>

<div class="overlay" onclick="toggleMenu()"></div>
<div id="sidebar">
    <div style="font-size:24px; margin-bottom:20px" onclick="toggleMenu()">✕</div>
    <div class="menu-item" onclick="showSection('feed')">🏠 Главная</div>
    <div class="menu-item" onclick="showSection('search')">🔍 Поиск</div>
    <div class="menu-item" onclick="showSection('chats')">💬 Чаты</div>
    <div class="menu-item" onclick="showSection('shop')">🛒 Магазин</div>
    <div class="menu-item" onclick="showSection('profile')">👤 Профиль</div>
    <hr style="border:0.5px solid var(--border); margin:20px 0;">
    <div id="accounts-list"></div>
    <div class="menu-item" onclick="logout()" style="color:#ff4444">🚪 Выйти</div>
</div>

<div class="main-container">
    
    <div id="sec-feed" class="section">
        <div style="display:flex; gap:20px; margin-bottom:15px">
            <b id="btn-all" onclick="setFeedMode('all')" style="cursor:pointer; color:var(--accent)">Для вас</b>
            <b id="btn-fol" onclick="setFeedMode('following')" style="cursor:pointer; color:#888">Вы читаете</b>
        </div>
        <div class="post">
            <textarea id="post-text" placeholder="Что нового?"></textarea>
            <input id="post-img" placeholder="Ссылка на фото (необязательно)">
            <button onclick="createPost()">Опубликовать</button>
        </div>
        <div id="feed-list"></div>
    </div>

    <div id="sec-search" class="section hidden">
        <input id="s-in" placeholder="Введите username..." oninput="search()">
        <div id="s-res"></div>
    </div>

    <div id="sec-chats" class="section hidden">
        <h3>Ваши сообщения</h3>
        <p style="color:#888">Функция чатов загружается...</p>
    </div>

    <div id="sec-shop" class="section hidden">
        <h2>Магазин VXR</h2>
        <div class="post">
            <b>Купить VXR</b>
            <button onclick="window.open('https://vxr-buy.tilda.ws/')">Купить на сайте</button>
        </div>
        <div class="post">
            Синяя галочка <b>299 VXR</b>
            <button onclick="buyStatus('blue', 299)">Купить автоматически</button>
        </div>
        <div class="post">
            Желтая галочка <b>499 VXR</b>
            <button onclick="buyStatus('yellow', 499)">Купить автоматически</button>
        </div>
    </div>

    <div id="sec-profile" class="section hidden">
        <div style="text-align:center; position:relative">
            <img id="p-img" class="avatar" style="width:100px; height:100px; border:2px solid var(--accent)">
            <div onclick="addStory()" style="position:absolute; top:75px; right:38%; background:var(--accent); color:white; border-radius:50%; width:30px; height:30px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-weight:bold; border:3px solid var(--bg)">+</div>
            <h2 id="p-n"></h2>
            <div id="p-lvl-box"></div>
            <p id="p-u" style="color:#888"></p>
            <p id="p-ref" style="font-size:12px; color:var(--accent); background:var(--card); padding:10px; border-radius:10px"></p>
            <button onclick="toggleEdit()">Редактировать</button>
        </div>
        <div id="e-b" class="hidden">
            <input id="e-n" placeholder="Новое имя">
            <input id="e-a" placeholder="Ссылка на новое фото">
            <button onclick="saveP()">Сохранить изменения</button>
        </div>
        <hr>
        <h3>Мои посты</h3>
        <div id="my-p"></div>
    </div>
</div>

<script>
let user = JSON.parse(localStorage.getItem('user'));
let isLogin = true;
let feedMode = 'all';

function toggleAuth() { isLogin = !isLogin; document.getElementById('reg-box').classList.toggle('hidden', isLogin); }
function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); document.querySelector('.overlay').classList.toggle('active'); }
function toggleTheme() { document.body.dataset.theme = document.body.dataset.theme==='dark'?'light':'dark'; }
function toggleEdit() { document.getElementById('e-b').classList.toggle('hidden'); }

async function auth() {
    const username = document.getElementById('auth-u').value;
    const password = document.getElementById('auth-p').value;
    const name = document.getElementById('auth-name').value;
    const r = await fetch(isLogin ? '/api/login' : '/api/register', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({username, password, name})
    });
    const d = await r.json();
    if(d.success) { localStorage.setItem('user', JSON.stringify(d.user)); location.reload(); } else alert(d.error);
}

function setFeedMode(m) {
    feedMode = m;
    document.getElementById('btn-all').style.color = m==='all' ? 'var(--accent)' : '#888';
    document.getElementById('btn-fol').style.color = m==='following' ? 'var(--accent)' : '#888';
    loadPosts();
}

async function loadPosts() {
    const r = await fetch(`/api/posts?mode=${feedMode}&me=${user.username}`);
    const posts = await r.json();
    document.getElementById('feed-list').innerHTML = posts.map(p => `
        <div class="post">
            <div style="display:flex; gap:10px; align-items:center">
                <img src="${p.avatar}" class="avatar">
                <b>${p.name}</b> <small>@${p.username}</small>
            </div>
            <p>${p.content}</p>
            ${p.image ? `<img src="${p.image}" style="width:100%; border-radius:10px; margin-top:10px">` : ''}
        </div>`).join('');
}

async function createPost() {
    const content = document.getElementById('post-text').value;
    const image = document.getElementById('post-img').value;
    const r = await fetch('/api/posts', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({userId: user.id, content, image})
    });
    const d = await r.json();
    if(d.success) { user = d.user; localStorage.setItem('user', JSON.stringify(user)); location.reload(); }
}

async function buyStatus(type, price) {
    if(user.balance < price) return alert("Недостаточно VXR!");
    const r = await fetch('/api/buy-status', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({userId: user.id, type, price})
    });
    const d = await r.json();
    if(d.success) { user = d.user; localStorage.setItem('user', JSON.stringify(user)); alert("Успешно куплено!"); location.reload(); }
}

function showSection(id) {
    document.querySelectorAll('.section').forEach(s=>s.classList.add('hidden'));
    document.getElementById('sec-'+id).classList.remove('hidden');
    if(id==='profile') {
        document.getElementById('p-img').src = user.avatar;
        document.getElementById('p-n').innerText = user.name;
        document.getElementById('p-n').className = user.isVerified ? 'verified-'+user.isVerified : '';
        document.getElementById('p-u').innerText = '@'+user.username;
        document.getElementById('p-lvl-box').innerHTML = `Уровень ${user.level} <span class="lvl-badge">${user.xp} XP</span>`;
        document.getElementById('p-ref').innerText = `Ваша реф. ссылка: vikhrify.com/reg?ref=${user.username}`;
        loadMyPosts();
    }
    toggleMenu();
}

async function loadMyPosts() {
    const r = await fetch('/api/posts?username=' + user.username);
    const posts = await r.json();
    document.getElementById('my-p').innerHTML = posts.map(p => `<div class="post"><p>${p.content}</p></div>`).join('');
}

async function saveP() {
    const name = document.getElementById('e-n').value;
    const avatar = document.getElementById('e-a').value;
    // Логика отправки на сервер (в админку или через отдельный API)
    if(name) user.name = name;
    if(avatar) user.avatar = avatar;
    localStorage.setItem('user', JSON.stringify(user));
    location.reload();
}

function logout() { localStorage.removeItem('user'); location.reload(); }

if(user) { document.getElementById('auth-page').classList.add('hidden'); loadPosts(); }
</script>
</body>
</html>
