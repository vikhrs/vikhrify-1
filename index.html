<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vikhrify</title>
    <style>
        :root { --bg: #000; --text: #fff; --accent: #007bff; --card: #121212; }
        [data-theme="light"] { --bg: #fff; --text: #000; --card: #f5f5f5; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; transition: 0.3s; }
        
        /* КРУПНЫЕ КНОПКИ */
        button { background: var(--accent); color: #fff; border: none; padding: 16px; border-radius: 12px; cursor: pointer; font-size: 17px; font-weight: bold; width: 100%; margin: 8px 0; transition: 0.2s; }
        button:active { transform: scale(0.98); opacity: 0.8; }
        input, textarea { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; font-size: 16px; }
        
        header { position: fixed; top: 0; width: 100%; height: 60px; background: var(--bg); border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: center; z-index: 100; }
        #main { margin: 70px 0 80px 0; padding: 15px; }
        nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: var(--bg); border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        
        .nav-item { text-align: center; font-size: 12px; cursor: pointer; opacity: 0.5; flex: 1; }
        .nav-item.active { opacity: 1; color: var(--accent); }
        
        #sidebar { position: fixed; left: -310px; top: 0; width: 300px; height: 100%; background: #080808; z-index: 200; transition: 0.3s; padding: 25px; box-sizing: border-box; border-right: 1px solid #222; }
        #sidebar.open { left: 0; }
        .post { background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #222; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="auth-box" class="auth-screen" style="padding: 50px 20px; text-align: center;">
    <h1>Vikhrify</h1>
    <div id="reg-inputs">
        <input type="text" id="a-name" placeholder="Имя">
    </div>
    <input type="text" id="a-user" placeholder="Юзернейм">
    <input type="password" id="a-pass" placeholder="Пароль">
    <button onclick="auth()" id="a-btn">Зарегистрироваться</button>
    <p onclick="toggleA()" id="a-sw" style="color:var(--accent); cursor:pointer">Уже есть аккаунт?</p>
</div>

<div id="app" class="hidden">
    <header>
        <div onclick="side(true)" style="position:absolute; left:20px; font-size:25px;">☰</div>
        <b style="font-size:22px">Vikhrify</b>
        <div onclick="theme()" style="position:absolute; right:20px;">🌓</div>
    </header>

    <div id="sidebar">
        <h1 onclick="side(false)">✕</h1>
        <button onclick="view('pub')">📤 Опубликовать</button>
        <button onclick="view('search')">🔍 Поиск людей</button>
        <hr>
        <h4>Аккаунты</h4>
        <div id="acc-list"></div>
        <button onclick="addAcc()" style="background:#333">+ Добавить</button>
        <button onclick="logout()" style="background:#500; margin-top:30px">Выйти</button>
    </div>

    <div id="main">
        <div id="v-feed" class="view"></div>
        <div id="v-chats" class="view hidden">
            <input type="text" id="c-target" placeholder="Юзернейм получателя">
            <textarea id="c-text" placeholder="Сообщение..."></textarea>
            <button onclick="sendMsg()">Отправить</button>
            <div id="c-history"></div>
        </div>
        <div id="v-profile" class="view hidden">
            <h2 id="my-name-display"></h2>
            <button onclick="view('edit')">⚙️ Настройки</button>
            <div id="my-posts"></div>
        </div>
        <div id="v-pub" class="view hidden">
            <textarea id="p-txt" placeholder="Что нового?"></textarea>
            <button onclick="post()">Опубликовать</button>
        </div>
    </div>

    <nav>
        <div class="nav-item active" onclick="view('feed')">🏠<br>Лента</div>
        <div class="nav-item" onclick="view('chats')">💬<br>Чаты</div>
        <div class="nav-item" onclick="view('profile')">👤<br>Профиль</div>
    </nav>
</div>

<script>
    let me = JSON.parse(localStorage.getItem('curr_v'));
    let accs = JSON.parse(localStorage.getItem('all_v')) || [];
    let isLogin = false;

    function toggleA() {
        isLogin = !isLogin;
        document.getElementById('reg-inputs').classList.toggle('hidden', isLogin);
        document.getElementById('a-btn').innerText = isLogin ? 'Войти' : 'Зарегистрироваться';
    }

    async function auth() {
        const username = document.getElementById('a-user').value;
        const password = document.getElementById('a-pass').value;
        const name = document.getElementById('a-name').value;
        const res = await fetch(isLogin ? '/api/auth/login' : '/api/auth/reg', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username, password, name})
        });
        if(res.ok) {
            me = await res.json();
            localStorage.setItem('curr_v', JSON.stringify(me));
            if(!accs.find(a => a.username === me.username)) accs.push(me);
            localStorage.setItem('all_v', JSON.stringify(accs));
            location.reload();
        }
    }

    function view(v) {
        document.querySelectorAll('.view').forEach(e => e.classList.add('hidden'));
        document.getElementById('v-' + v).classList.remove('hidden');
        side(false);
    }

    async function loadPosts() {
        const r = await fetch('/api/posts');
        const posts = await r.json();
        document.getElementById('v-feed').innerHTML = posts.map(p => `
            <div class="post"><b>${p.name}</b><p>${p.text}</p></div>
        `).join('');
    }

    if(me) {
        document.getElementById('auth-box').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        setInterval(loadPosts, 3000);
        loadPosts();
    }
    
    function side(s) { document.getElementById('sidebar').classList.toggle('open', s); }
    function logout() { localStorage.removeItem('curr_v'); location.reload(); }
</script>
</body>
</html>
