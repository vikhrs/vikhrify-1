<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vikhrify</title>
  <style>
    :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #e6edf3; --accent: #58a6ff; }
    body { margin:0; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); }
    .hidden { display:none !important; }
    
    /* Авторизация */
    #auth { position:fixed; inset:0; background: var(--bg); display:flex; align-items:center; justify-content:center; z-index:10000; }
    .auth-card { background: var(--card); padding:30px; border-radius:12px; width:90%; max-width:380px; border:1px solid var(--border); }

    /* Хедер и Меню */
    header { position:fixed; top:0; left:0; right:0; height:60px; background: var(--card); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 20px; z-index:1000; }
    .burger { font-size:24px; cursor:pointer; }
    
    #sidebar { position:fixed; top:0; left:-280px; width:280px; height:100%; background: var(--card); border-right:1px solid var(--border); transition: 0.3s; z-index:2000; padding-top:60px; }
    #sidebar.open { left:0; }
    .nav-item { display:flex; align-items:center; gap:15px; padding:15px 25px; cursor:pointer; transition: 0.2s; }
    .nav-item:hover { background: #21262d; }
    .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); display:none; z-index:1500; }
    .overlay.show { display:block; }

    .container { margin-top:70px; padding:15px; max-width:700px; margin:70px auto 0 auto; }
    .section { display:none; }
    .section.active { display:block; }

    input, button, textarea { width:100%; padding:12px; margin:8px 0; border-radius:8px; border:1px solid var(--border); background: var(--bg); color: var(--text); }
    button { cursor:pointer; font-weight:bold; border:none; background: #238636; }
    
    .post { background: var(--card); padding:15px; margin-bottom:15px; border-radius:12px; border:1px solid var(--border); }
    .avatar { width:50px; height:50px; border-radius:50%; object-fit:cover; background:#333; }
    .verified-blue::after { content:" ✔"; color:#1d9bf0; }
    .verified-yellow::after { content:" ✔"; color:#fbbc05; }

    /* Магазин */
    .shop-card { background: var(--card); border:1px solid var(--border); padding:15px; border-radius:12px; margin-bottom:10px; text-align:center; }
  </style>
</head>
<body>

<div id="auth">
  <div class="auth-card">
    <h2 style="text-align:center">Vikhrify</h2>
    <div id="reg-fields">
      <input id="reg-name" placeholder="Имя">
    </div>
    <input id="auth-user" placeholder="Юзернейм">
    <input id="auth-pass" type="password" placeholder="Пароль">
    <button onclick="handleAuth()" id="btn-main">Создать аккаунт</button>
    <button style="background:none; color:var(--accent)" onclick="toggleAuthMode()" id="btn-switch">Есть аккаунт? Войти</button>
    <div id="auth-msg" style="text-align:center; margin-top:10px; color: #ff7b72;"></div>
  </div>
</div>

<header>
  <div class="burger" onclick="toggleMenu()">☰</div>
  <div style="margin-left:15px; font-weight:bold;">Vikhrify</div>
</header>

<div class="overlay" onclick="toggleMenu()"></div>

<div id="sidebar">
  <div class="nav-item" onclick="show('feed')">🏠 Лента</div>
  <div class="nav-item" onclick="show('profile')">👤 Профиль</div>
  <div class="nav-item" onclick="show('chats')">💬 Чаты</div>
  <div class="nav-item" onclick="show('buy')">🛒 Магазин</div>
  <div class="nav-item" onclick="show('create-post')">➕ Пост</div>
  <div class="nav-item" onclick="show('search-tab')">🔍 Поиск</div>
</div>

<div class="container">
  <div id="feed" class="section">
    <div id="posts-list"></div>
  </div>

  <div id="profile" class="section">
    <div style="text-align:center">
      <img id="p-avatar" class="avatar" style="width:100px; height:100px">
      <h2 id="p-name"></h2>
      <p id="p-user-display" style="color:#8b949e"></p>
      <p>Подписчиков: <b id="p-subs">0</b> | Баланс: <b id="p-bal">0</b> VXR</p>
      
      <button onclick="document.getElementById('edit-box').classList.toggle('hidden')" style="background:var(--accent); width:auto; padding:8px 15px">Редактировать</button>
      <button onclick="logout()" style="background:#da3633; width:auto; padding:8px 15px">Выйти</button>
      
      <div id="edit-box" class="hidden" style="margin-top:15px; border:1px solid var(--border); padding:10px; border-radius:8px;">
        <input id="edit-name" placeholder="Новое имя">
        <label>Сменить фото:</label>
        <input type="file" id="edit-file" accept="image/*">
        <button onclick="saveProfile()">Сохранить</button>
      </div>

      <div style="margin-top:15px; padding:10px; background:#21262d; border-radius:8px;">
        <small>Ваша ссылка для друзей:</small><br>
        <code id="ref-link"></code>
      </div>
    </div>
    <hr style="border:0; border-top:1px solid var(--border); margin:20px 0">
    <div id="my-posts"></div>
  </div>

  <div id="buy" class="section">
    <h2>Магазин VXR</h2>
    <div class="shop-card">
      <h3>Купить VXR</h3>
      <input type="range" id="vxr-slider" min="100" max="10000" value="500" step="100" oninput="updateVxrVal(this.value)">
      <p>Выбрано: <b id="vxr-count">500</b> VXR = <b id="vxr-price">500</b> руб.</p>
      <button onclick="goToPay()">Купить VXR</button>
    </div>
    
    <div class="shop-card">
      <h3 class="verified-blue">Premium Blue</h3>
      <p>Синяя галочка рядом с именем</p>
      <button style="background:#1d9bf0" onclick="goToPay()">Купить за 299 ₽</button>
    </div>

    <div class="shop-card">
      <h3 class="verified-yellow">Premium Gold</h3>
      <p>Золотая галочка + Уникальный статус</p>
      <button style="background:#fbbc05; color:black" onclick="goToPay()">Купить за 499 ₽</button>
    </div>
  </div>

  <div id="chats" class="section">
    <div id="chat-list-view">
       <button onclick="writeByUsername()">+ Написать по юзернейму</button>
       <div id="my-chats"></div>
    </div>
    <div id="chat-window" class="hidden">
       <button onclick="closeChat()">← Назад</button>
       <h3 id="chat-title"></h3>
       <div id="msg-list" style="height:300px; overflow-y:auto; border:1px solid var(--border); padding:10px; display:flex; flex-direction:column; gap:5px;"></div>
       <div style="display:flex; gap:5px; margin-top:10px">
         <input id="msg-input" placeholder="Сообщение...">
         <button onclick="sendMsg()" style="width:80px">-></button>
       </div>
    </div>
  </div>

  <div id="create-post" class="section">
    <h2>Новый пост</h2>
    <textarea id="post-text" placeholder="Текст поста..." rows="5"></textarea>
    <input type="file" id="post-file" accept="image/*">
    <button onclick="publishPost()">Опубликовать</button>
  </div>
</div>

<script>
let user = JSON.parse(localStorage.getItem('user'));
let isLoginMode = true; // По умолчанию Вход
let currentPartner = null;

// Инициализация при загрузке
window.onload = () => {
  if(!user) {
    toggleAuthMode(); // Показываем окно входа
  } else {
    document.getElementById('auth').classList.add('hidden');
    show('feed');
  }
};

function toggleAuthMode() {
  isLoginMode = !isLoginMode;
  document.getElementById('reg-fields').classList.toggle('hidden', isLoginMode);
  document.getElementById('btn-main').textContent = isLoginMode ? 'Войти' : 'Создать аккаунт';
  document.getElementById('btn-switch').textContent = isLoginMode ? 'Нет аккаунта? Регистрация' : 'Уже есть аккаунт? Войти';
}

function toggleMenu() {
  document.getElementById('sidebar').classList.toggle('open');
  document.querySelector('.overlay').classList.toggle('show');
}

async function handleAuth() {
  const name = document.getElementById('reg-name').value;
  const username = document.getElementById('auth-user').value.toLowerCase().trim();
  const password = document.getElementById('auth-pass').value;

  if(!username || !password) return alert("Заполни поля!");

  const endpoint = isLoginMode ? '/api/login' : '/api/register';
  const body = isLoginMode ? { username, password } : { name, username, password };

  const r = await fetch(endpoint, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
  const d = await r.json();
  if(d.success) { 
    localStorage.setItem('user', JSON.stringify(d.user)); 
    location.reload(); 
  } else {
    document.getElementById('auth-msg').innerText = d.error;
  }
}

function show(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id === 'feed') loadPosts();
  if(id === 'profile') loadMyProfile();
  if(id === 'chats') loadChatList();
  if(document.getElementById('sidebar').classList.contains('open')) toggleMenu();
}

async function loadPosts() {
  const r = await fetch('/api/posts');
  const data = await r.json();
  document.getElementById('posts-list').innerHTML = data.reverse().map(p => `
    <div class="post">
      <div style="display:flex; align-items:center; gap:10px">
        <img src="${p.avatar}" class="avatar">
        <b class="${p.isVerified ? 'verified-'+p.isVerified : ''}">${p.name}</b>
      </div>
      <p>${p.content}</p>
      ${p.image ? `<img src="${p.image}" style="width:100%; border-radius:8px">` : ''}
    </div>
  `).join('');
}

async function loadMyProfile() {
  const r = await fetch(`/api/me/${user.id}`);
  const d = await r.json();
  document.getElementById('p-name').className = d.isVerified ? 'verified-'+d.isVerified : '';
  document.getElementById('p-name').textContent = d.name;
  document.getElementById('p-user-display').textContent = '@' + d.username;
  document.getElementById('p-bal').textContent = d.balance;
  document.getElementById('p-avatar').src = d.avatar;
  document.getElementById('p-subs').textContent = d.followers || 0;
  document.getElementById('ref-link').textContent = `${window.location.origin}?ref=${d.username}`;
}

async function saveProfile() {
  const name = document.getElementById('edit-name').value;
  const file = document.getElementById('edit-file').files[0];
  let avatar = null;
  if(file) avatar = await toBase64(file);

  await fetch('/api/profile/update', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ id: user.id, name, avatar })
  });
  location.reload();
}

async function publishPost() {
  const content = document.getElementById('post-text').value;
  const file = document.getElementById('post-file').files[0];
  let image = file ? await toBase64(file) : null;

  await fetch('/api/posts', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ userId: user.id, content, image })
  });
  show('feed');
}

function updateVxrVal(val) {
  document.getElementById('vxr-count').innerText = val;
  document.getElementById('vxr-price').innerText = val;
}

function goToPay() {
  window.open('https://vxr.tilda.ws/', '_blank');
}

function logout() {
  localStorage.clear();
  location.reload();
}

const toBase64 = f => new Promise((res) => {
  const r = new FileReader(); r.readAsDataURL(f); r.onload = () => res(r.result);
});

// ЧАТЫ И ЛОГИКА СООБЩЕНИЙ ТАКАЯ ЖЕ, НО С АВТООБНОВЛЕНИЕМ
setInterval(() => { if(currentPartner) loadMessages(); }, 3000);
</script>
</body>
</html>
