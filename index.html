<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vikhrify</title>
  <style>
    :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #e6edf3; --accent: #58a6ff; }
    body { margin:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
    
    /* Авторизация */
    #auth { position:fixed; inset:0; background: rgba(0,0,0,0.9); backdrop-filter:blur(10px); display:flex; align-items:center; justify-content:center; z-index:10000; }
    .auth-card { background: var(--card); padding:30px; border-radius:12px; width:90%; max-width:380px; border:1px solid var(--border); box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
    .hidden { display:none !important; }

    /* Хедер и Бургер */
    header { position:fixed; top:0; left:0; right:0; height:60px; background: var(--card); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 20px; z-index:1000; }
    .burger { font-size:24px; cursor:pointer; margin-right:20px; }
    
    /* Боковое меню */
    #sidebar { position:fixed; top:0; left:-280px; width:280px; height:100%; background: var(--card); border-right:1px solid var(--border); transition: 0.3s; z-index:2000; padding-top:60px; }
    #sidebar.open { left:0; }
    .nav-item { display:flex; align-items:center; gap:15px; padding:15px 25px; cursor:pointer; font-size:1.1rem; transition: 0.2s; }
    .nav-item:hover { background: #21262d; }
    .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); display:none; z-index:1500; }
    .overlay.show { display:block; }

    /* Контент */
    .container { margin-top:70px; padding:15px; max-width:700px; margin-left:auto; margin-right:auto; }
    .section { display:none; }
    .section.active { display:block; }

    input, button, textarea { width:100%; padding:12px; margin:8px 0; border-radius:8px; border:1px solid var(--border); background: var(--bg); color: var(--text); box-sizing:border-box; }
    button { cursor:pointer; font-weight:bold; border:none; background: #238636; }
    button:hover { opacity:0.8; }
    
    .post { background: var(--card); padding:15px; margin-bottom:15px; border-radius:12px; border:1px solid var(--border); }
    .avatar { width:45px; height:45px; border-radius:50%; object-fit:cover; background:#30363d; }
    
    /* Чаты */
    #msg-list { height:400px; overflow-y:auto; display:flex; flex-direction:column; gap:8px; padding:10px; border:1px solid var(--border); margin-bottom:10px; }
    .msg { max-width:75%; padding:10px; border-radius:12px; }
    .msg.me { align-self: flex-end; background:#238636; }
    .msg.other { align-self: flex-start; background:#30363d; }
    
    .profile-header { text-align:center; padding:20px; }
    .post-link-btn { background: none; color: var(--accent); width: auto; font-size: 0.8rem; padding: 0; }
  </style>
</head>
<body>

<div id="auth">
  <div class="auth-card">
    <h2 style="text-align:center">Vikhrify</h2>
    <div id="reg-fields">
      <input id="reg-name" placeholder="Ваше Имя">
    </div>
    <input id="auth-user" placeholder="Юзернейм">
    <input id="auth-pass" type="password" placeholder="Пароль">
    <button onclick="handleAuth()" id="btn-main">Создать аккаунт</button>
    <button style="background:none; color:var(--accent)" onclick="toggleAuthMode()" id="btn-switch">Есть аккаунт? Войти</button>
    <div id="auth-msg" style="text-align:center; margin-top:10px; color: #ff7b72;"></div>
  </div>
</div>

<header>
  <div class="burger" onclick="toggleMenu()">☰</div>
  <div style="font-weight:bold; font-size:1.2rem;">Vikhrify</div>
</header>

<div class="overlay" onclick="toggleMenu()"></div>

<div id="sidebar">
  <div class="nav-item" onclick="show('feed')">🏠 Лента</div>
  <div class="nav-item" onclick="show('profile')">👤 Профиль</div>
  <div class="nav-item" onclick="show('chats')">💬 Чаты</div>
  <div class="nav-item" onclick="show('buy')">🛒 Магазин</div>
  <div class="nav-item" onclick="show('create-post')">➕ Пост</div>
  <div class="nav-item" onclick="show('search-tab')">🔍 Найти людей</div>
</div>

<div class="container">
  <div id="feed" class="section active">
    <div id="posts-list"></div>
  </div>

  <div id="profile" class="section">
    <div class="profile-header">
      <img id="p-avatar" class="avatar" style="width:100px; height:100px">
      <h2 id="p-name"></h2>
      <p style="color:#8b949e">@<span id="p-user"></span></p>
      <p>Подписчиков: <b id="p-subs">0</b> | Баланс: <b id="p-bal">0</b> VXR</p>
      <button onclick="document.getElementById('edit-fields').classList.toggle('hidden')" style="width:auto; padding:8px 20px; background:var(--accent)">Редактировать профиль</button>
      
      <div id="edit-fields" class="hidden" style="margin-top:15px; border:1px solid var(--border); padding:10px; border-radius:8px;">
        <input id="edit-name" placeholder="Новое имя">
        <input id="edit-avatar" placeholder="URL нового фото">
        <button onclick="saveProfile()">Сохранить изменения</button>
      </div>
    </div>
    <h3>Мои посты</h3>
    <div id="my-posts"></div>
  </div>

  <div id="chats" class="section">
    <div id="chat-list-view">
       <button onclick="writeByUsername()" style="background:var(--accent)">+ Написать по юзернейму</button>
       <div id="my-chats"></div>
    </div>
    <div id="chat-window" class="hidden">
       <button onclick="closeChat()">← Назад</button>
       <h3 id="chat-with-name"></h3>
       <div id="msg-list"></div>
       <div style="display:flex; gap:5px">
         <input id="msg-input" placeholder="Сообщение...">
         <button onclick="sendMsg()" style="width:80px">Отпр.</button>
       </div>
    </div>
  </div>

  <div id="search-tab" class="section">
    <input placeholder="Введите @username..." oninput="searchUsers(this.value)">
    <div id="search-results"></div>
  </div>

  <div id="buy" class="section">
    <h2>Магазин VXR</h2>
    <input type="range" id="slider-price" min="100" max="10000" value="500" step="100">
    <p>Сумма: <b id="price-val">500</b> ₽</p>
    <button onclick="buyVXR()">Оплатить</button>
  </div>

  <div id="create-post" class="section">
    <h2>Новый пост</h2>
    <textarea id="post-text" placeholder="О чем вы думаете?" rows="5"></textarea>
    <input type="file" id="post-photo" accept="image/*">
    <button onclick="publishPost()">Опубликовать</button>
  </div>
</div>

<script>
let user = JSON.parse(localStorage.getItem('user'));
let isLoginMode = false;
let currentChatPartner = null;

function toggleAuthMode() {
  isLoginMode = !isLoginMode;
  document.getElementById('reg-fields').classList.toggle('hidden', isLoginMode);
  document.getElementById('btn-main').textContent = isLoginMode ? 'Войти' : 'Создать аккаунт';
  document.getElementById('btn-switch').textContent = isLoginMode ? 'Нет аккаунта? Регистрация' : 'Есть аккаунт? Войти';
}

function toggleMenu() {
  document.getElementById('sidebar').classList.toggle('open');
  document.querySelector('.overlay').classList.toggle('show');
}

async function handleAuth() {
  const name = document.getElementById('reg-name').value;
  const username = document.getElementById('auth-user').value.toLowerCase().trim();
  const password = document.getElementById('auth-pass').value;
  if(!username || !password) return;

  const endpoint = isLoginMode ? '/api/login' : '/api/register';
  const body = isLoginMode ? { username, password } : { name, username, password };

  const r = await fetch(endpoint, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
  const d = await r.json();
  if(d.success) { localStorage.setItem('user', JSON.stringify(d.user)); location.reload(); }
  else document.getElementById('auth-msg').innerText = d.error;
}

function show(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  toggleMenu();
  if(id === 'feed') loadPosts();
  if(id === 'profile') loadMyProfile();
  if(id === 'chats') loadChatList();
}

async function loadPosts() {
  const r = await fetch('/api/posts');
  const data = await r.json();
  document.getElementById('posts-list').innerHTML = data.reverse().map(p => `
    <div class="post">
      <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px">
        <img src="${p.avatar}" class="avatar">
        <b>${p.name}</b>
      </div>
      <p>${p.content}</p>
      ${p.image ? `<img src="${p.image}" style="width:100%; border-radius:8px">` : ''}
      <button class="post-link-btn" onclick="copyPostLink('${p.id}')">🔗 Поделиться</button>
    </div>
  `).join('');
}

async function loadMyProfile() {
  const r = await fetch(`/api/me/${user.id}`);
  const d = await r.json();
  document.getElementById('p-name').textContent = d.name;
  document.getElementById('p-user').textContent = d.username;
  document.getElementById('p-bal').textContent = d.balance;
  document.getElementById('p-avatar').src = d.avatar;
  document.getElementById('p-subs').textContent = d.followers || 0;
}

async function saveProfile() {
  const name = document.getElementById('edit-name').value;
  const avatar = document.getElementById('edit-avatar').value;
  await fetch('/api/profile/update', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ id: user.id, name, avatar })
  });
  location.reload();
}

async function writeByUsername() {
  const target = prompt("Введите юзернейм:");
  if(target) openChat(target.toLowerCase().replace('@',''));
}

async function openChat(username) {
  currentChatPartner = username;
  document.getElementById('chat-list-view').classList.add('hidden');
  document.getElementById('chat-window').classList.remove('hidden');
  document.getElementById('chat-with-name').textContent = '@' + username;
  loadMessages();
}

async function loadMessages() {
  if(!currentChatPartner) return;
  const r = await fetch(`/api/messages?me=${user.username}&other=${currentChatPartner}`);
  const data = await r.json();
  const list = document.getElementById('msg-list');
  list.innerHTML = data.map(m => `<div class="msg ${m.from === user.username ? 'me' : 'other'}">${m.text}</div>`).join('');
  list.scrollTop = 99999;
}

async function sendMsg() {
  const text = document.getElementById('msg-input').value;
  if(!text) return;
  await fetch('/api/messages', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ from:user.username, to:currentChatPartner, text })
  });
  document.getElementById('msg-input').value = '';
  loadMessages();
}

function copyPostLink(id) {
  const link = `${window.location.origin}/post/${id}`;
  navigator.clipboard.writeText(link);
  alert("Ссылка на пост скопирована!");
}

if(user) {
  document.getElementById('auth').classList.add('hidden');
  loadPosts();
  setInterval(() => { if(currentChatPartner) loadMessages(); }, 3000);
}
</script>
</body>
</html>
