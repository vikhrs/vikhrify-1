<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vikhrify</title>
  <style>
    :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #e6edf3; --accent: #58a6ff; }
    body { margin:0; font-family: sans-serif; background: var(--bg); color: var(--text); }
    .hidden { display:none !important; }
    
    /* Фон и Логотип */
    #auth { 
      position:fixed; inset:0; z-index:10000; display:flex; flex-direction:column; align-items:center; justify-content:center;
      background: url('bg-v.jpg') center/cover;
    }
    #auth::before { content:""; position:absolute; inset:0; background:rgba(0,0,0,0.6); z-index:-1; backdrop-filter: blur(5px); }
    .auth-logo { width:100px; margin-bottom:20px; filter: drop-shadow(0 0 10px var(--accent)); }
    .auth-card { background: var(--card); padding:25px; border-radius:15px; width:90%; max-width:350px; border:1px solid var(--border); }

    header { position:fixed; top:0; left:0; right:0; height:60px; background: var(--card); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 20px; z-index:1000; }
    .burger { font-size:24px; cursor:pointer; }
    
    #sidebar { position:fixed; top:0; left:-280px; width:280px; height:100%; background: var(--card); border-right:1px solid var(--border); transition: 0.3s; z-index:2000; }
    #sidebar.open { left:0; }
    .nav-item { padding:15px 25px; cursor:pointer; display:flex; gap:10px; }
    .nav-item:hover { background: #21262d; }

    .container { margin: 70px auto; max-width:600px; padding:10px; }
    .section { display:none; }
    .section.active { display:block; }
    .post { background: var(--card); padding:15px; border-radius:12px; border:1px solid var(--border); margin-bottom:15px; }
    .avatar { width:45px; height:45px; border-radius:50%; object-fit:cover; }
    .verified-blue::after { content:" ✔"; color:#1d9bf0; }
    .verified-yellow::after { content:" ✔"; color:#fbbc05; }
    .verified-red::after { content:" ✔"; color:#ff4444; }

    input, button, textarea { width:100%; padding:12px; margin:8px 0; border-radius:8px; border:1px solid var(--border); background: var(--bg); color: #fff; box-sizing: border-box; }
    button { background: #238636; border:none; cursor:pointer; font-weight:bold; }
    .btn-login { background: #da3633; }
    #msg-list { height:300px; overflow-y:auto; display:flex; flex-direction:column; gap:5px; border:1px solid var(--border); padding:10px; }
    .msg { padding:8px 12px; border-radius:10px; max-width:80%; }
    .msg.me { align-self: flex-end; background: #238636; }
    .msg.other { align-self: flex-start; background: #30363d; }
  </style>
</head>
<body>

<div id="auth">
  <img src="logo-v.png" class="auth-logo">
  <div class="auth-card">
    <h2 style="text-align:center; margin-top:0">Добро пожаловать в Vikhrify !</h2>
    <div id="reg-box" class="hidden"><input id="reg-name" placeholder="Ваше Имя"></div>
    <input id="auth-u" placeholder="Юзернейм">
    <input id="auth-p" type="password" placeholder="Пароль">
    <button onclick="handleAuth()" id="btn-main" class="btn-login">Войти</button>
    <button style="background:none; color:var(--accent)" onclick="toggleAuth()">Нет аккаунта? Регистрация</button>
    <p id="auth-err" style="color:#ff7b72; text-align:center"></p>
  </div>
</div>

<header><div class="burger" onclick="toggleMenu()">☰</div><b style="margin-left:15px">Vikhrify</b></header>
<div id="sidebar">
  <div class="nav-item" onclick="toggleMenu()" style="justify-content:flex-end">✕</div>
  <div class="nav-item" onclick="show('feed')">🏠 Лента</div>
  <div class="nav-item" onclick="show('profile')">👤 Профиль</div>
  <div class="nav-item" onclick="show('chats')">💬 Чаты</div>
  <div class="nav-item" onclick="show('buy')">🛒 Магазин</div>
  <div class="nav-item" onclick="show('create-post')">➕ Пост</div>
</div>

<div class="container">
  <div id="feed" class="section active"><div id="posts-list"></div></div>
  
  <div id="profile" class="section" style="text-align:center">
    <img id="p-avatar" class="avatar" style="width:100px; height:100px">
    <h2 id="p-name"></h2>
    <p id="p-user" style="color:#8b949e"></p>
    <p>Подписчиков: <b id="p-subs">0</b> | VXR: <b id="p-bal">0</b></p>
    <div style="background:#21262d; padding:10px; border-radius:8px; margin:10px 0">
      <small>Реферальная ссылка:</small><br>
      <span style="color:var(--accent); cursor:pointer" onclick="copyRef()" id="ref-link"></span>
    </div>
    <button onclick="logout()" style="background:#da3633">Выйти</button>
  </div>

  <div id="chats" class="section">
    <div id="chat-list-view">
      <button onclick="startChat()">+ Начать чат</button>
      <div id="my-chats-list"></div>
    </div>
    <div id="chat-window" class="hidden">
      <button onclick="closeChat()">← Назад</button>
      <h3 id="chat-title"></h3>
      <div id="msg-list"></div>
      <div style="display:flex; gap:5px; margin-top:10px">
        <input id="msg-in" placeholder="Сообщение...">
        <button onclick="sendMsg()" style="width:60px">></button>
      </div>
    </div>
  </div>

  <div id="create-post" class="section">
    <textarea id="post-text" placeholder="Что нового?" rows="4"></textarea>
    <input type="file" id="post-img" accept="image/*">
    <button onclick="sendPost()">Опубликовать</button>
  </div>
  
  <div id="buy" class="section">
    <h2>Магазин VXR</h2>
    <input type="range" min="100" max="10000" step="100" value="500" oninput="document.getElementById('v-v').innerText=this.value">
    <p>К оплате: <b id="v-v">500</b> ₽</p>
    <button onclick="window.open('https://vxr.tilda.ws/')">Купить VXR / Премиум</button>
  </div>
</div>

<script>
let user = JSON.parse(localStorage.getItem('user'));
let isLogin = true; let lastId = 0; let curPartner = null;

function toggleAuth() { 
  isLogin = !isLogin; 
  document.getElementById('reg-box').classList.toggle('hidden', isLogin);
  document.getElementById('btn-main').innerText = isLogin ? 'Войти' : 'Создать аккаунт';
}

function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }

async function handleAuth() {
  const name = document.getElementById('reg-name').value;
  const username = document.getElementById('auth-u').value;
  const password = document.getElementById('auth-p').value;
  const r = await fetch(isLogin ? '/api/login' : '/api/register', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({name, username, password})
  });
  const d = await r.json();
  if(d.success) { localStorage.setItem('user', JSON.stringify(d.user)); location.reload(); }
  else { document.getElementById('auth-err').innerText = d.error; }
}

function show(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='feed') loadPosts();
  if(id==='profile') loadProfile();
  if(document.getElementById('sidebar').classList.contains('open')) toggleMenu();
}

async function loadPosts() {
  const r = await fetch('/api/posts'); const data = await r.json();
  if(data.length) lastId = data[data.length-1].id;
  document.getElementById('posts-list').innerHTML = data.reverse().map(p => `
    <div class="post">
      <div style="display:flex; align-items:center; gap:10px">
        <img src="${p.avatar}" class="avatar">
        <b class="${p.isVerified?'verified-'+p.isVerified:''}">${p.name}</b>
      </div>
      <p>${p.content}</p>
      ${p.image ? `<img src="${p.image}" style="width:100%; border-radius:8px">`:''}
    </div>`).join('');
}

async function checkNewPosts() {
  if(!document.getElementById('feed').classList.contains('active')) return;
  const r = await fetch(`/api/posts/new?after=${lastId}`);
  const news = await r.json();
  news.forEach(p => {
    document.getElementById('posts-list').insertAdjacentHTML('afterbegin', `
      <div class="post"><b>${p.name}</b><p>${p.content}</p></div>
    `);
    lastId = Math.max(lastId, p.id);
  });
}

function loadProfile() {
  fetch(`/api/me/${user.id}`).then(r => r.json()).then(d => {
    document.getElementById('p-name').innerText = d.name;
    document.getElementById('p-user').innerText = '@'+d.username;
    document.getElementById('p-bal').innerText = d.balance;
    document.getElementById('p-subs').innerText = d.followers;
    document.getElementById('p-avatar').src = d.avatar;
    document.getElementById('ref-link').innerText = window.location.origin + '?ref=' + d.username;
  });
}

async function sendPost() {
  const content = document.getElementById('post-text').value;
  const file = document.getElementById('post-img').files[0];
  let image = null;
  if(file) image = await new Promise(res => { const rd = new FileReader(); rd.readAsDataURL(file); rd.onload = () => res(rd.result); });
  await fetch('/api/posts', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId:user.id, content, image}) });
  document.getElementById('post-text').value = ''; show('feed');
}

function logout() { localStorage.clear(); location.reload(); }
function copyRef() { navigator.clipboard.writeText(document.getElementById('ref-link').innerText); alert('Скопировано!'); }

if(user) { document.getElementById('auth').classList.add('hidden'); show('feed'); }
setInterval(checkNewPosts, 5000);
</script>
</body>
</html>
