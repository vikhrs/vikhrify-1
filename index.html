<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vikhrify</title>
  <style>
    body { margin:0; font-family:Arial,sans-serif; background:#0d1117; color:#e6edf3; }
    #auth { position:fixed; inset:0; background:rgba(0,0,0,0.95); backdrop-filter:blur(10px); display:flex; align-items:center; justify-content:center; z-index:9999; }
    .hidden { display:none !important; }
    .auth-card { background:#161b22; padding:32px; border-radius:12px; width:90%; max-width:400px; border:1px solid #30363d; }
    input, button, textarea { width:100%; padding:12px; margin:8px 0; border-radius:8px; border:1px solid #30363d; background:#0d1117; color:#e6edf3; box-sizing:border-box; }
    button { cursor:pointer; font-weight:bold; border:none; transition: 0.2s; }
    .btn-primary { background:#238636; }
    .btn-primary:hover { background:#2ea043; }
    .btn-danger { background:#da3633; }
    nav { position:fixed; bottom:0; left:0; right:0; background:#161b22; border-top:1px solid #30363d; display:flex; z-index:100; }
    nav button { flex:1; background:none; color:#8b949e; border:none; padding:15px; font-size:0.8rem; }
    nav button.active { color:#58a6ff; }
    .section { display:none; padding:15px 15px 100px; }
    .section.active { display:block; }
    .post { background:#161b22; padding:15px; margin-bottom:15px; border-radius:12px; border:1px solid #30363d; }
    .post-header { display:flex; align-items:center; gap:10px; margin-bottom:10px; cursor:pointer; }
    .avatar { width:45px; height:45px; border-radius:50%; object-fit:cover; background:#30363d; }
    .verified-blue::after { content:"✔"; color:#1d9bf0; margin-left:4px; }
    .verified-yellow::after { content:"✔"; color:#fbbc05; margin-left:4px; }
    .verified-red::after { content:"✔"; color:#ff4444; margin-left:4px; }
    #msg-list { height:400px; overflow-y:auto; display:flex; flex-direction:column; gap:8px; padding:10px; border:1px solid #30363d; border-radius:8px; margin-bottom:10px; }
    .msg { max-width:75%; padding:10px; border-radius:12px; font-size:0.95rem; }
    .msg.me { align-self: flex-end; background:#238636; color:white; }
    .msg.other { align-self: flex-start; background:#30363d; color:white; }
    .profile-header { text-align:center; padding:20px; border-bottom:1px solid #30363d; margin-bottom:20px; }
  </style>
</head>
<body>

<div id="auth">
  <div class="auth-card">
    <h2 style="text-align:center">Vikhrify</h2>
    <div id="reg-fields">
      <input id="reg-name" placeholder="Имя">
      <input id="reg-user" placeholder="Юзернейм (латиница)" oninput="this.value=this.value.replace(/[^a-zA-Z0-9]/g,'')">
    </div>
    <input id="auth-pass" type="password" placeholder="Пароль">
    <button class="btn-primary" onclick="handleAuth()" id="btn-main">Создать аккаунт</button>
    <button style="background:none; color:#58a6ff" onclick="toggleAuthMode()" id="btn-switch">Есть аккаунт? Войти</button>
    <div id="auth-msg" style="text-align:center; margin-top:10px"></div>
  </div>
</div>

<div id="app" class="hidden">
  <div id="feed" class="section active">
    <input id="search-user" placeholder="Найти человека по @юзернейму..." oninput="searchUsers(this.value)">
    <div id="search-results"></div>
    <textarea id="post-text" placeholder="Что у вас нового?"></textarea>
    <input type="file" id="post-photo" accept="image/*">
    <button class="btn-primary" onclick="publishPost()">Опубликовать</button>
    <div id="posts-list"></div>
  </div>

  <div id="view-profile" class="section">
    <button onclick="show('feed')">← Назад</button>
    <div class="profile-header">
      <img id="v-avatar" class="avatar" style="width:90px; height:90px">
      <h2 id="v-name"></h2>
      <p id="v-sub-count" style="color:#8b949e">Подписчиков: 0</p>
      <div style="display:flex; gap:10px; justify-content:center">
        <button id="btn-sub" class="btn-primary" style="width:auto; padding:8px 25px"></button>
        <button onclick="startChatFromProfile()" style="width:auto; padding:8px 25px; background:#58a6ff">Написать</button>
      </div>
    </div>
    <div id="v-posts"></div>
  </div>

  <div id="chats" class="section">
    <div id="chat-list-view">
       <h2>Мои переписки</h2>
       <div id="my-chats"></div>
    </div>
    <div id="chat-window" class="hidden">
       <button onclick="closeChat()">← Назад</button>
       <h3 id="chat-with-name"></h3>
       <div id="msg-list"></div>
       <div style="display:flex; gap:5px">
         <input id="msg-input" placeholder="Сообщение...">
         <button onclick="sendMsg()" style="width:80px; background:#238636">Go</button>
       </div>
    </div>
  </div>

  <div id="buy" class="section">
    <h2>VXR Store</h2>
    <input type="range" id="slider-price" min="100" max="10000" value="500" step="100">
    <p>Сумма: <b><span id="price-val">500</span> ₽</b> → <b><span id="vxr-val">500</span> VXR</b></p>
    <button class="btn-primary" onclick="buyVXR()">Купить VXR</button>
    <hr style="border:1px solid #30363d; margin:20px 0">
    <button onclick="buyPremium('blue')" style="background:#1d9bf0">Синяя галочка — 299 ₽</button>
    <button onclick="buyPremium('yellow')" style="background:#fbbc05; color:black">Желтая галочка — 499 ₽</button>
  </div>

  <div id="profile" class="section">
    <div class="profile-header">
      <img id="p-avatar" class="avatar" style="width:90px; height:90px">
      <h2 id="p-name"></h2>
      <p>@<span id="p-user"></span> | <b id="p-bal">0</b> VXR</p>
      <button onclick="copyRef()" style="background:#58a6ff; width:auto; padding:8px 15px">Пригласить (50 VXR)</button>
    </div>
    <h3>Мои записи</h3>
    <div id="my-posts"></div>
    <button class="btn-danger" onclick="logout()">Выйти</button>
  </div>

  <nav>
    <button onclick="show('feed')" id="n-feed" class="active">Лента</button>
    <button onclick="show('chats')" id="n-chats">Чаты</button>
    <button onclick="show('buy')" id="n-buy">Магазин</button>
    <button onclick="show('profile')" id="n-profile">Профиль</button>
  </nav>
</div>

<script>
let user = JSON.parse(localStorage.getItem('user'));
let isLoginMode = false;
let currentChatPartner = null;
let viewedUser = null;

function toggleAuthMode() {
  isLoginMode = !isLoginMode;
  document.getElementById('reg-fields').classList.toggle('hidden', isLoginMode);
  document.getElementById('btn-main').textContent = isLoginMode ? 'Войти' : 'Создать аккаунт';
}

async function handleAuth() {
  const name = document.getElementById('reg-name').value;
  const username = document.getElementById('reg-user').value.toLowerCase().trim();
  const password = document.getElementById('auth-pass').value;
  const ref = new URLSearchParams(window.location.search).get('ref');

  const endpoint = isLoginMode ? '/api/login' : '/api/register';
  const body = isLoginMode ? { username, password } : { name, username, password, ref };

  const r = await fetch(endpoint, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
  const d = await r.json();
  if(d.success) { localStorage.setItem('user', JSON.stringify(d.user)); location.reload(); }
  else document.getElementById('auth-msg').innerText = d.error;
}

function show(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const navBtn = document.getElementById('n-' + id);
  if(navBtn) navBtn.classList.add('active');
  
  if(id === 'feed') loadPosts();
  if(id === 'profile') loadMyProfile();
  if(id === 'chats') loadChatList();
}

async function loadPosts() {
  const r = await fetch('/api/posts');
  const data = await r.json();
  document.getElementById('posts-list').innerHTML = data.reverse().map(p => `
    <div class="post">
      <div class="post-header" onclick="viewUserProfile('${p.username}')">
        <img src="${p.avatar}" class="avatar">
        <div class="${p.isVerified ? 'verified-'+p.isVerified : ''}"><b>${p.name}</b></div>
      </div>
      <p>${p.content}</p>
      ${p.image ? `<img src="${p.image}" style="width:100%; border-radius:8px">` : ''}
    </div>
  `).join('');
}

async function viewUserProfile(username) {
  if(username === user.username) return show('profile');
  const r = await fetch(`/api/user/${username}`);
  viewedUser = await r.json();
  
  show('view-profile');
  document.getElementById('v-name').textContent = viewedUser.name;
  document.getElementById('v-avatar').src = viewedUser.avatar;
  document.getElementById('v-sub-count').textContent = `Подписчиков: ${viewedUser.followers || 0}`;
  
  const isSub = viewedUser.followerList?.includes(user.username);
  const btn = document.getElementById('btn-sub');
  btn.textContent = isSub ? 'Отписаться' : 'Подписаться';
  btn.onclick = () => toggleSub(username);

  const postsR = await fetch('/api/posts');
  const allPosts = await postsR.json();
  document.getElementById('v-posts').innerHTML = allPosts.filter(p => p.username === username).reverse().map(p => `
    <div class="post"><p>${p.content}</p>${p.image ? `<img src="${p.image}" style="width:100%">` : ''}</div>
  `).join('');
}

async function toggleSub(targetUser) {
  const r = await fetch('/api/subscribe', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ me: user.username, target: targetUser })
  });
  viewUserProfile(targetUser);
}

function startChatFromProfile() {
  openChat(viewedUser.username);
  show('chats');
}

async function loadMyProfile() {
  const r = await fetch(`/api/me/${user.id}`);
  const d = await r.json();
  document.getElementById('p-name').textContent = d.name;
  document.getElementById('p-user').textContent = d.username;
  document.getElementById('p-bal').textContent = d.balance;
  document.getElementById('p-avatar').src = d.avatar;
  
  const pr = await fetch('/api/posts');
  const my = (await pr.json()).filter(p => p.userId === d.id).reverse();
  document.getElementById('my-posts').innerHTML = my.map(p => `
    <div class="post"><p>${p.content}</p></div>
  `).join('');
}

async function publishPost() {
  const content = document.getElementById('post-text').value;
  const file = document.getElementById('post-photo').files[0];
  if(!content) return;
  
  const img = file ? await toBase64(file) : null;
  await fetch('/api/posts', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ userId:user.id, content, image:img })
  });
  document.getElementById('post-text').value = '';
  loadPosts();
}

async function openChat(username) {
  currentChatPartner = username;
  document.getElementById('chat-list-view').classList.add('hidden');
  document.getElementById('chat-window').classList.remove('hidden');
  document.getElementById('chat-with-name').textContent = '@' + username;
  loadMessages();
}

async function loadMessages() {
  if(!currentChatPartner) return;
  const r = await fetch(`/api/messages?me=${user.username}&other=${currentChatPartner}`);
  const data = await r.json();
  document.getElementById('msg-list').innerHTML = data.map(m => `
    <div class="msg ${m.from === user.username ? 'me' : 'other'}">${m.text}</div>
  `).join('');
  document.getElementById('msg-list').scrollTop = 99999;
}

async function sendMsg() {
  const text = document.getElementById('msg-input').value;
  if(!text) return;
  await fetch('/api/messages', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ from:user.username, to:currentChatPartner, text })
  });
  document.getElementById('msg-input').value = '';
  loadMessages();
}

async function loadChatList() {
  const r = await fetch(`/api/my-chats?user=${user.username}`);
  const chats = await r.json();
  document.getElementById('my-chats').innerHTML = chats.map(c => `<div class="post" onclick="openChat('${c}')">Чат с @${c}</div>`).join('');
}

function closeChat() {
  document.getElementById('chat-list-view').classList.remove('hidden');
  document.getElementById('chat-window').classList.add('hidden');
  currentChatPartner = null;
}

const toBase64 = f => new Promise((res, rej) => {
  const r = new FileReader(); r.readAsDataURL(f); r.onload = () => res(r.result);
});

async function buyVXR() {
  const amount = document.getElementById('slider-price').value;
  const r = await fetch('/api/create-payment', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ userId:user.id, amount, type:'vxr' }) });
  const d = await r.json(); if(d.url) window.open(d.url, '_blank');
}

function copyRef() {
  navigator.clipboard.writeText(`${window.location.origin}?ref=${user.username}`);
  alert("Ссылка скопирована!");
}

function logout() { localStorage.clear(); location.reload(); }

document.getElementById('slider-price').oninput = function() {
  document.getElementById('price-val').innerText = this.value;
  document.getElementById('vxr-val').innerText = this.value;
};

if(user) {
  document.getElementById('auth').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  show('feed');
  setInterval(loadMessages, 4000);
}
</script>
</body>
</html>
