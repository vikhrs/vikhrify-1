<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vikhrify</title>
  <style>
    :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #e6edf3; --accent: #58a6ff; }
    body { margin:0; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
    .hidden { display:none !important; }
    
    /* Авторизация с твоим фоном и логотипом */
    #auth { 
      position:fixed; inset:0; 
      background: url('bg-v.jpg') no-repeat center center; 
      background-size: cover; 
      display:flex; flex-direction: column; align-items:center; justify-content:center; 
      z-index:10000; backdrop-filter: blur(5px);
    }
    .auth-logo { width: 120px; height: 120px; margin-bottom: 20px; filter: drop-shadow(0 0 15px rgba(255,165,0,0.7)); }
    .auth-card { background: rgba(22, 27, 34, 0.9); padding:30px; border-radius:12px; width:90%; max-width:380px; border:1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .auth-title { text-align:center; color: var(--accent); margin-bottom: 5px; }
    .auth-subtitle { text-align:center; color: #8b949e; margin-bottom: 20px; font-size: 0.9rem; }

    /* Хедер и Меню */
    header { position:fixed; top:0; left:0; right:0; height:60px; background: var(--card); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 20px; z-index:1000; }
    .burger { font-size:24px; cursor:pointer; }
    
    #sidebar { position:fixed; top:0; left:-280px; width:280px; height:100%; background: var(--card); border-right:1px solid var(--border); transition: 0.3s; z-index:2000; padding-top:20px; }
    #sidebar.open { left:0; }
    .nav-item { display:flex; align-items:center; gap:15px; padding:15px 25px; cursor:pointer; transition: 0.2s; }
    .nav-item:hover { background: #21262d; }
    .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); display:none; z-index:1500; }
    .overlay.show { display:block; }

    .container { margin-top:70px; padding:15px; max-width:700px; margin:70px auto 0 auto; padding-bottom:100px; }
    .section { display:none; }
    .section.active { display:block; }

    input, button, textarea { width:100%; padding:12px; margin:8px 0; border-radius:8px; border:1px solid var(--border); background: var(--bg); color: var(--text); box-sizing: border-box; }
    button { cursor:pointer; font-weight:bold; border:none; background: #238636; }
    .btn-login { background: #da3633; } /* Красная кнопка входа */
    
    .post { background: var(--card); padding:15px; margin-bottom:15px; border-radius:12px; border:1px solid var(--border); transition: 0.3s; }
    .avatar { width:50px; height:50px; border-radius:50%; object-fit:cover; background:#333; }
    .verified-blue::after { content:" ✔"; color:#1d9bf0; }
    .verified-yellow::after { content:" ✔"; color:#fbbc05; }

    .ref-link { color: var(--accent); cursor: pointer; text-decoration: underline; font-weight: bold; }
    #msg-list { height:350px; overflow-y:auto; display:flex; flex-direction:column; gap:8px; padding:10px; border:1px solid var(--border); border-radius:8px; }
    .msg { max-width:75%; padding:10px; border-radius:12px; }
    .msg.me { align-self: flex-end; background:#238636; }
    .msg.other { align-self: flex-start; background:#30363d; }
  </style>
</head>
<body>

<div id="auth">
  <img src="logo-v.png" class="auth-logo">
  <div class="auth-card">
    <h2 class="auth-title">Добро пожаловать в Vikhrify !</h2>
    <p class="auth-subtitle">Твой VXR - Твои правила</p>
    <div id="reg-fields" class="hidden">
      <input id="reg-name" placeholder="Имя">
    </div>
    <input id="auth-user" placeholder="Юзернейм">
    <input id="auth-pass" type="password" placeholder="Пароль">
    <button onclick="handleAuth()" id="btn-main" class="btn-login">Войти</button>
    <button style="background:none; color:var(--accent)" onclick="toggleAuthMode()" id="btn-switch">Нет аккаунта? Регистрация</button>
    <div id="auth-msg" style="text-align:center; margin-top:10px; color: #ff7b72;"></div>
  </div>
</div>

<header>
  <div class="burger" onclick="toggleMenu()">☰</div>
  <div style="margin-left:15px; font-weight:bold; font-size:1.2rem;">Vikhrify</div>
</header>

<div class="overlay" onclick="toggleMenu()"></div>

<div id="sidebar">
  <div class="nav-item" style="justify-content: flex-end; font-size: 1.5rem;" onclick="toggleMenu()">☰</div>
  <div class="nav-item" onclick="show('feed')">🏠 Лента</div>
  <div class="nav-item" onclick="show('profile')">👤 Профиль</div>
  <div class="nav-item" onclick="show('chats')">💬 Чаты</div>
  <div class="nav-item" onclick="show('buy')">🛒 Магазин</div>
  <div class="nav-item" onclick="show('create-post')">➕ Пост</div>
  <div class="nav-item" onclick="show('search-tab')">🔍 Поиск</div>
</div>

<div class="container">
  <div id="feed" class="section">
    <div id="posts-list"></div>
  </div>

  <div id="profile" class="section">
    <div style="text-align:center">
      <img id="p-avatar" class="avatar" style="width:100px; height:100px">
      <h2 id="p-name"></h2>
      <p id="p-user-display" style="color:#8b949e"></p>
      <p>Подписчиков: <b id="p-subs">0</b> | Баланс: <b id="p-bal">0</b> VXR</p>
      <button onclick="editProfileName()" style="background:var(--accent); width:auto; padding:8px 15px">Имя</button>
      <button onclick="logout()" style="background:#da3633; width:auto; padding:8px 15px">Выход</button>
      <div style="margin-top:15px; padding:10px; background:#21262d; border-radius:8px;">
        <small>Пригласи друга (50 VXR):</small><br>
        <span id="ref-link-display" class="ref-link" onclick="copyRef()"></span>
      </div>
    </div>
    <div id="my-posts" style="margin-top:20px"></div>
  </div>

  <div id="buy" class="section">
    <h2>Магазин VXR</h2>
    <input type="range" id="vxr-slider" min="100" max="10000" value="500" step="100" oninput="updateVxrVal(this.value)">
    <p>Сумма: <b id="vxr-price">500</b> ₽ = <b><span id="vxr-count">500</span> VXR</b></p>
    <button onclick="window.open('https://vxr.tilda.ws/', '_blank')">Оплатить</button>
  </div>

  <div id="chats" class="section">
    <div id="chat-list-view">
       <button onclick="writeByUsername()">+ Написать по юзернейму</button>
       <div id="my-chats"></div>
    </div>
    <div id="chat-window" class="hidden">
       <button onclick="closeChat()">← Назад</button>
       <h3 id="chat-title"></h3>
       <div id="msg-list"></div>
       <div style="display:flex; gap:5px; margin-top:10px">
         <input id="msg-input" placeholder="Сообщение...">
         <button onclick="sendMsg()" style="width:80px">-></button>
       </div>
    </div>
  </div>
</div>

<script>
let user = JSON.parse(localStorage.getItem('user'));
let isLoginMode = true; 
let lastPostId = 0;
let currentPartner = null;

window.onload = () => {
  if(!user) { document.getElementById('auth').classList.remove('hidden'); } 
  else { document.getElementById('auth').classList.add('hidden'); show('feed'); }
};

function toggleAuthMode() {
  isLoginMode = !isLoginMode;
  document.getElementById('reg-fields').classList.toggle('hidden', isLoginMode);
  document.getElementById('btn-main').textContent = isLoginMode ? 'Войти' : 'Создать аккаунт';
  document.getElementById('btn-main').classList.toggle('btn-login', isLoginMode);
  document.getElementById('btn-switch').textContent = isLoginMode ? 'Нет аккаунта? Регистрация' : 'Есть аккаунт? Войти';
}

function toggleMenu() {
  document.getElementById('sidebar').classList.toggle('open');
  document.querySelector('.overlay').classList.toggle('show');
}

async function handleAuth() {
  const name = document.getElementById('reg-name').value;
  const username = document.getElementById('auth-user').value.toLowerCase().trim();
  const password = document.getElementById('auth-pass').value;
  if(!username || !password) return;
  const endpoint = isLoginMode ? '/api/login' : '/api/register';
  const r = await fetch(endpoint, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name, username, password}) });
  const d = await r.json();
  if(d.success) { localStorage.setItem('user', JSON.stringify(d.user)); location.reload(); }
  else { document.getElementById('auth-msg').innerText = d.error; }
}

function show(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id === 'feed') loadPosts();
  if(id === 'profile') loadMyProfile();
  if(document.getElementById('sidebar').classList.contains('open')) toggleMenu();
}

function renderPost(p) {
  return `
    <div class="post" id="post-${p.id}">
      <div style="display:flex; align-items:center; gap:10px">
        <img src="${p.avatar}" class="avatar">
        <b class="${p.isVerified ? 'verified-'+p.isVerified : ''}">${p.name}</b>
      </div>
      <p>${p.content}</p>
      ${p.image ? `<img src="${p.image}" style="width:100%; border-radius:8px">` : ''}
    </div>`;
}

async function loadPosts() {
  const r = await fetch('/api/posts');
  const data = await r.json();
  if(data.length > 0) lastPostId = data[data.length-1].id;
  document.getElementById('posts-list').innerHTML = data.reverse().map(p => renderPost(p)).join('');
}

async function checkNewPosts() {
  if(!document.getElementById('feed').classList.contains('active')) return;
  const r = await fetch(`/api/posts/new?after=${lastPostId}`);
  const newPosts = await r.json();
  if(newPosts.length > 0) {
    const list = document.getElementById('posts-list');
    newPosts.forEach(p => {
      list.insertAdjacentHTML('afterbegin', renderPost(p));
      if(p.id > lastPostId) lastPostId = p.id;
    });
  }
}

async function loadMyProfile() {
  const r = await fetch(`/api/me/${user.id}`);
  const d = await r.json();
  document.getElementById('p-name').textContent = d.name;
  document.getElementById('p-user-display').textContent = '@' + d.username;
  document.getElementById('p-bal').textContent = d.balance;
  document.getElementById('p-avatar').src = d.avatar;
  document.getElementById('p-subs').textContent = d.followers || 0;
  document.getElementById('ref-link-display').textContent = `${window.location.origin}?ref=${d.username}`;
}

function copyRef() {
  const link = document.getElementById('ref-link-display').textContent;
  navigator.clipboard.writeText(link);
  alert("Ссылка скопирована!");
}

function updateVxrVal(val) {
  document.getElementById('vxr-count').innerText = val;
  document.getElementById('vxr-price').innerText = val;
}

function logout() { localStorage.clear(); location.reload(); }

setInterval(checkNewPosts, 5000);
setInterval(() => { if(currentPartner) loadMessages(); }, 3000);
</script>
</body>
</html>
