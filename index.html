<!DOCTYPE html>
<html lang="ru">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vikhrify</title>
    <style>
        body { background:#000; color:#fff; font-family:sans-serif; margin:0; }
        .view { display:none; padding:20px; } .view.active { display:block; }
        .btn { width:100%; padding:20px; border-radius:12px; border:none; background:#007bff; color:#fff; font-size:18px; margin:10px 0; }
        .input { width:100%; padding:20px; border-radius:12px; border:1px solid #333; background:#111; color:#fff; box-sizing:border-box; margin:10px 0; }
        .nav { position:fixed; bottom:0; width:100%; display:flex; background:#111; padding:10px 0; }
        .nav button { flex:1; background:none; border:none; color:#fff; font-size:14px; }
        .badge { color:red; font-weight:bold; }
    </style>
</head>
<body>
    <div id="auth-screen">
        <h1>Добро пожаловать в Vikhrify!</h1>
        <input id="in-n" class="input" placeholder="Имя">
        <input id="in-u" class="input" placeholder="Юзернейм (англ)">
        <input id="in-p" class="input" type="password" placeholder="Пароль">
        <button class="btn" onclick="auth('reg')">Регистрация</button>
        <button class="btn" style="background:#444" onclick="auth('login')">Вход</button>
    </div>

    <div id="app" style="display:none">
        <header style="padding:15px; text-align:center; font-size:24px;">Vikhrify</header>
        <div id="burger" style="position:absolute; top:15px; left:15px; font-size:24px;" onclick="toggleMenu()">≡</div>
        
        <div id="v-feed" class="view active">
            <div id="feed-list"></div>
        </div>
        
        <div id="v-chats" class="view">
            <input id="chat-u" class="input" placeholder="Юзернейм для чата">
            <button class="btn" onclick="startChat()">Найти и написать</button>
            <h3>Мои чаты:</h3>
            <div id="chat-history"></div>
        </div>

        <div id="v-profile" class="view">
            <h2 id="p-name"></h2>
            <p id="p-user"></p>
            <div id="p-badge" class="badge"></div>
            <button class="btn" onclick="editProfile()">Изменить профиль</button>
            <h3>Мои посты:</h3>
            <div id="my-posts"></div>
        </div>

        <nav class="nav">
            <button onclick="show('feed')">🏠 Лента</button>
            <button onclick="show('chats')">💬 Чаты</button>
            <button onclick="show('profile')">👤 Профиль</button>
        </nav>
    </div>

    <script>
        // Функция автообновления
        setInterval(async () => {
            const r = await fetch('/api/data');
            const d = await r.json();
            // Тут логика отрисовки ленты, чатов и профиля...
        }, 3000);

        async function auth(t) {
            const u = document.getElementById('in-u').value;
            const r = await fetch('/api/auth', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u, password:document.getElementById('in-p').value, name:document.getElementById('in-n').value, type:t}) });
            if(r.ok) { localStorage.setItem('curr', JSON.stringify({username:u})); location.reload(); }
            else alert('Юзернейм занят или неверный пароль');
        }
        
        function show(v) { document.querySelectorAll('.view').forEach(e=>e.classList.remove('active')); document.getElementById('v-'+v).classList.add('active'); }
    </script>
</body>
</html>
