<!DOCTYPE html>
<html lang="ru">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vikhrify</title>
    <style>
        body { margin:0; background:#000; color:#fff; font-family:sans-serif; }
        .view { display:none; padding:20px; } .view.active { display:block; }
        .btn { width:100%; padding:22px; margin:10px 0; border-radius:15px; border:none; background:#007bff; color:#fff; font-size:18px; }
        .input { width:100%; padding:20px; margin:10px 0; border-radius:15px; border:1px solid #333; background:#111; color:#fff; box-sizing:border-box; }
        #sidebar { position:fixed; left:-100%; top:0; width:80%; height:100%; background:#111; transition:0.3s; padding:20px; z-index:99; }
        #sidebar.open { left:0; }
    </style>
</head>
<body>
    <div id="auth">
        <h1>Добро пожаловать в Vikhrify!</h1>
        <input id="n" class="input" placeholder="Имя">
        <input id="u" class="input" placeholder="Юзернейм (англ)">
        <input id="p" class="input" type="password" placeholder="Пароль">
        <button class="btn" onclick="auth('reg')">Регистрация</button>
        <button class="btn" style="background:#444" onclick="auth('login')">Вход</button>
    </div>

    <div id="app" style="display:none">
        <button onclick="document.getElementById('sidebar').classList.add('open')">≡ Меню</button>
        <div id="sidebar">
            <button class="btn" onclick="document.getElementById('sidebar').classList.remove('open')">✕ Закрыть</button>
            <button class="btn" onclick="show('pub')">📤 Пост</button>
            <button class="btn" onclick="logout()">🚪 Выход</button>
        </div>
        <div id="v-feed" class="view active"><h1>Лента</h1><div id="feed"></div></div>
        <div id="v-pub" class="view"><textarea id="p-text" class="input"></textarea><button class="btn" onclick="post()">Отправить</button></div>
    </div>

    <script>
        let me = JSON.parse(localStorage.getItem('curr'));
        if(me) { document.getElementById('auth').style.display='none'; document.getElementById('app').style.display='block'; }
        async function auth(t) {
            const r = await fetch('/api/auth', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:document.getElementById('u').value, password:document.getElementById('p').value, name:document.getElementById('n').value, type:t}) });
            if(r.ok) { localStorage.setItem('curr', JSON.stringify({username:document.getElementById('u').value})); location.reload(); }
        }
        function show(v) { document.querySelectorAll('.view').forEach(e=>e.classList.remove('active')); document.getElementById('v-'+v).classList.add('active'); }
        async function post() { await fetch('/api/post', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({text:document.getElementById('p-text').value}) }); alert('Пост готов!'); }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
