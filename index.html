<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vikhrify</title>
    <style>
        :root { --bg: #ffffff; --card: #f8f9fa; --text: #000; --accent: #007bff; --border: #ddd; }
        [data-theme="dark"] { --bg: #0d1117; --card: #161b22; --text: #e6edf3; --accent: #58a6ff; --border: #30363d; }
        body { margin:0; font-family: sans-serif; background: var(--bg); color: var(--text); }
        .hidden { display:none !important; }
        header { position:fixed; top:0; width:100%; height:60px; background:var(--card); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 15px; z-index:1000; box-sizing:border-box; }
        #sidebar { position:fixed; top:0; left:-100%; width:280px; height:100%; background:var(--card); border-right:1px solid var(--border); transition:0.3s; z-index:2000; padding:20px; box-sizing:border-box; overflow-y:auto; }
        #sidebar.active { left:0; }
        .main-container { margin-top:70px; padding:15px; max-width:600px; margin:70px auto 0; }
        .post { background:var(--card); padding:15px; border-radius:15px; margin-bottom:15px; border:1px solid var(--border); }
        .avatar { width:45px; height:45px; border-radius:50%; object-fit:cover; }
        .menu-item { padding:12px; border-radius:10px; cursor:pointer; font-weight:bold; display:flex; align-items:center; gap:10px; }
        #auth-page { position:fixed; inset:0; background:var(--bg); z-index:10000; display:flex; align-items:center; justify-content:center; }
        .auth-card { background:var(--card); padding:30px; border-radius:20px; width:90%; max-width:350px; border:1px solid var(--border); text-align:center; }
        input, textarea, button { width:100%; padding:12px; margin:8px 0; border-radius:10px; border:1px solid var(--border); background:var(--bg); color:var(--text); box-sizing:border-box; }
        button { background:var(--accent); color:#fff; border:none; cursor:pointer; font-weight:bold; }
        .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1500; display:none; }
        .overlay.active { display:block; }
    </style>
</head>
<body data-theme="dark">

<div id="auth-page">
    <div class="auth-card">
        <h1>Vikhrify</h1>
        <div id="reg-box" class="hidden"><input id="auth-name" placeholder="Имя"></div>
        <input id="auth-u" placeholder="Username">
        <input id="auth-p" type="password" placeholder="Пароль">
        <button onclick="auth()">Войти</button>
        <p onclick="toggleAuth()" style="cursor:pointer; color:var(--accent)">Регистрация</p>
    </div>
</div>

<header>
    <div onclick="toggleMenu()" style="font-size:24px; cursor:pointer">☰</div>
    <div style="font-weight:bold; font-size:20px">Vikhrify</div>
    <div onclick="toggleTheme()" style="font-size:20px; cursor:pointer">🌓</div>
</header>

<div class="overlay" onclick="toggleMenu()"></div>
<div id="sidebar">
    <div style="font-size:24px; margin-bottom:20px" onclick="toggleMenu()">✕</div>
    <div class="menu-item" onclick="showSection('feed')">🏠 Главная</div>
    <div class="menu-item" onclick="showSection('create-post')" style="color:var(--accent)">➕ Создать пост</div>
    <div class="menu-item" onclick="showSection('search')">🔍 Поиск</div>
    <div class="menu-item" onclick="showSection('chats')">💬 Чаты</div>
    <div class="menu-item" onclick="showSection('shop')">🛒 Магазин</div>
    <div class="menu-item" onclick="showSection('profile')">👤 Профиль</div>
    <hr style="border:0.5px solid var(--border); margin:20px 0;">
    <div id="accounts-list"></div>
    <div class="menu-item" onclick="addAcc()" style="color:var(--accent)">+ Добавить аккаунт</div>
    <div class="menu-item" onclick="logout()" style="color:#ff4444">🚪 Выйти</div>
</div>

<div class="main-container">
    <div id="sec-feed" class="section">
        <div style="display:flex; gap:20px; margin-bottom:15px">
            <b id="btn-all" onclick="setFeedMode('all')" style="cursor:pointer; color:var(--accent)">Для вас</b>
            <b id="btn-fol" onclick="setFeedMode('fol')" style="cursor:pointer; color:#888">Вы читаете</b>
        </div>
        <div id="feed-list"></div>
    </div>

    <div id="sec-create-post" class="section hidden">
        <h3>Новый пост</h3>
        <textarea id="p-text" placeholder="О чем думаете?"></textarea>
        <label>Добавить фото: <input type="file" id="p-file" accept="image/*"></label>
        <button onclick="publishPost()">Опубликовать</button>
    </div>

    <div id="sec-chats" class="section hidden">
        <h3>Личные сообщения</h3>
        <div style="display:flex; gap:5px">
            <input id="chat-target" placeholder="Кому (username)">
            <button onclick="openChat()" style="width:100px">Найти</button>
        </div>
        <div id="chat-window" class="hidden">
            <div id="chat-msgs" style="height:300px; overflow-y:auto; background:var(--card); margin:10px 0; padding:10px; border-radius:10px"></div>
            <input id="chat-msg" placeholder="Сообщение...">
            <button onclick="sendMsg()">Отправить</button>
        </div>
    </div>

    <div id="sec-profile" class="section hidden">
        <center>
            <img id="p-img" class="avatar" style="width:100px; height:100px">
            <h2 id="p-n"></h2>
            <p id="p-lvl"></p>
            <p id="p-ref" style="font-size:12px; color:var(--accent)"></p>
            <button onclick="document.getElementById('edit-box').classList.toggle('hidden')">Редактировать</button>
            <div id="edit-box" class="hidden">
                <input id="e-n" placeholder="Новое имя">
                <label>Сменить аватар: <input type="file" id="e-file" accept="image/*"></label>
                <button onclick="saveProfile()">Сохранить</button>
            </div>
        </center>
    </div>

    <div id="sec-shop" class="section hidden">
        <h2>Магазин</h2>
        <div class="post">VXR Пополнение <button onclick="window.open('https://vxr-buy.tilda.ws/')">Купить на сайте</button></div>
        <div class="post">Синяя галка (299 VXR) <button onclick="buy('blue', 299)">Купить</button></div>
    </div>
</div>

<script>
let user = JSON.parse(localStorage.getItem('user'));
let accounts = JSON.parse(localStorage.getItem('vxr_accs')) || [];
let isLogin = true;

function toggleAuth() { isLogin = !isLogin; document.getElementById('reg-box').classList.toggle('hidden', isLogin); }
function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); document.querySelector('.overlay').classList.toggle('active'); }
function toggleTheme() { document.body.dataset.theme = document.body.dataset.theme==='dark'?'light':'dark'; }

async function auth() {
    const username = document.getElementById('auth-u').value;
    const password = document.getElementById('auth-p').value;
    const name = document.getElementById('auth-name').value;
    const r = await fetch(isLogin ? '/api/login' : '/api/register', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({username, password, name})
    });
    const d = await r.json();
    if(d.success) {
        if(!accounts.find(a=>a.username===d.user.username)) accounts.push(d.user);
        localStorage.setItem('vxr_accs', JSON.stringify(accounts));
        localStorage.setItem('user', JSON.stringify(d.user));
        location.reload();
    } else alert(d.error);
}

// Преобразование файла в Base64
const toBase64 = file => new Promise((res, rej) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => res(reader.result);
});

async function publishPost() {
    const content = document.getElementById('p-text').value;
    const file = document.getElementById('p-file').files[0];
    const imgBase = file ? await toBase64(file) : null;
    await fetch('/api/posts', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({userId: user.id, content, imageBase64: imgBase})
    });
    location.reload();
}

async function saveProfile() {
    const name = document.getElementById('e-n').value;
    const file = document.getElementById('e-file').files[0];
    if(name) user.name = name;
    if(file) user.avatar = await toBase64(file);
    localStorage.setItem('user', JSON.stringify(user));
    // Тут можно добавить fetch на сервер для сохранения в БД
    location.reload();
}

function showSection(id) {
    document.querySelectorAll('.section').forEach(s=>s.classList.add('hidden'));
    document.getElementById('sec-'+id).classList.remove('hidden');
    if(id==='profile') {
        document.getElementById('p-img').src = user.avatar;
        document.getElementById('p-n').innerText = user.name;
        document.getElementById('p-lvl').innerText = `Уровень ${user.level} (${user.xp} XP)`;
        document.getElementById('p-ref').innerText = `Реф. ссылка: vikhrify.ws/reg?ref=${user.username}`;
    }
    toggleMenu();
}

function renderAccs() {
    document.getElementById('accounts-list').innerHTML = accounts.map(a => `
        <div class="menu-item" onclick="switchAcc('${a.username}')" style="${a.username===user.username?'color:var(--accent)':''}">
            <img src="${a.avatar}" class="avatar" style="width:20px; height:20px"> ${a.name}
        </div>`).join('');
}
function switchAcc(un) { localStorage.setItem('user', JSON.stringify(accounts.find(a=>a.username===un))); location.reload(); }
function addAcc() { document.getElementById('auth-page').classList.remove('hidden'); toggleMenu(); }
function logout() { localStorage.removeItem('user'); location.reload(); }

async function loadFeed() {
    const r = await fetch('/api/posts');
    const posts = await r.json();
    document.getElementById('feed-list').innerHTML = posts.map(p => `
        <div class="post">
            <div style="display:flex; gap:10px; align-items:center">
                <img src="${p.avatar}" class="avatar"> <b>${p.name}</b>
            </div>
            <p>${p.content}</p>
            ${p.image ? `<img src="${p.image}" style="width:100%; border-radius:10px">` : ''}
        </div>`).join('');
}

if(user) { document.getElementById('auth-page').classList.add('hidden'); renderAccs(); loadFeed(); }
</script>
</body>
</html>
