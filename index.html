<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vikhrify</title>
    <style>
        :root { --bg: #000; --text: #fff; --accent: #007bff; --card: #111; }
        [data-theme="light"] { --bg: #fff; --text: #000; --card: #f0f0f0; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; }
        header { position: fixed; top: 0; width: 100%; height: 50px; background: var(--bg); border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: center; z-index: 100; }
        .logo { font-weight: bold; font-size: 20px; }
        #main { margin: 60px 0 70px 0; padding: 10px; }
        nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: var(--bg); border-top: 1px solid #333; display: flex; justify-content: space-around; align-items: center; }
        .nav-item { text-align: center; font-size: 10px; cursor: pointer; opacity: 0.6; }
        .nav-item.active { opacity: 1; color: var(--accent); }
        .post { background: var(--card); padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        .author { color: var(--accent); font-weight: bold; cursor: pointer; }
        .hidden { display: none; }
        #sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: var(--card); z-index: 200; transition: 0.3s; padding: 20px; box-sizing: border-box; }
        #sidebar.open { left: 0; }
    </style>
</head>
<body data-theme="dark">

<header>
    <div onclick="toggleMenu(true)" style="position:absolute; left:15px; cursor:pointer">☰</div>
    <div class="logo">Vikhrify</div>
    <div onclick="toggleTheme()" style="position:absolute; right:15px; cursor:pointer">🌓</div>
</header>

<div id="sidebar">
    <h3 onclick="toggleMenu(false)">✕ Закрыть</h3>
    <button onclick="showPublish()">📝 Опубликовать пост</button>
    <button onclick="showSearch()">🔍 Поиск людей</button>
    <hr>
    <div id="accs"></div>
    <button onclick="logout()" style="color:red">🚪 Выйти</button>
</div>

<div id="main">
    <div id="v-feed" class="view"></div>
    <div id="v-chats" class="view hidden">
        <button onclick="newChat()">+ Написать по юзернейму</button>
        <div id="my-chats-list"></div>
    </div>
    <div id="v-profile" class="view hidden">
        <img id="p-avatar" style="width:80px; height:80px; border-radius:50%">
        <h2 id="p-name"></h2>
        <p id="p-un"></p>
        <p>ID: <span id="p-id"></span> | Подписчики: <span id="p-subs">0</span> | Рейтинг: <span id="p-rate">0</span></p>
        <button onclick="editMode()">⚙️ Редактировать</button>
        <button onclick="copyLink()">🔗 Ссылка</button>
        <hr><h3>Мои посты</h3><div id="my-posts"></div>
    </div>
</div>

<nav>
    <div class="nav-item active" onclick="switchView('feed')">🏠<br>Лента</div>
    <div class="nav-item" onclick="switchView('chats')">💬<br>Чаты</div>
    <div class="nav-item" onclick="switchView('profile')">👤<br>Профиль</div>
</nav>

<script>
    let me = JSON.parse(localStorage.getItem('user'));
    let theme = 'dark';

    // АВТООБНОВЛЕНИЕ 3 сек
    setInterval(() => {
        if(!document.getElementById('v-feed').classList.contains('hidden')) loadPosts();
    }, 3000);

    async function loadPosts() {
        const r = await fetch('/api/posts');
        const posts = await r.json();
        document.getElementById('v-feed').innerHTML = posts.map(p => `
            <div class="post">
                <span class="author" onclick="openUser('${p.username}')">${p.name}</span>
                <p>${p.text}</p>
                ${p.image ? `<img src="${p.image}" style="width:100%">` : ''}
            </div>
        `).join('');
    }

    function switchView(v) {
        document.querySelectorAll('.view').forEach(el => el.classList.add('hidden'));
        document.getElementById('v-' + v).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        if(v === 'profile') renderMyProfile();
        toggleMenu(false);
    }

    function toggleTheme() {
        theme = theme === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', theme);
    }

    function toggleMenu(s) { document.getElementById('sidebar').classList.toggle('open', s); }

    function copyLink() {
        navigator.clipboard.writeText(window.location.origin + '/' + me.username);
        alert('Ссылка скопирована!');
    }

    // Инициализация (упрощенно)
    if(!me) { 
        let u = prompt("Юзернейм?"); 
        let n = prompt("Имя?");
        fetch('/api/auth', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u, name:n, password:'123'})})
        .then(res => res.json()).then(data => { me = data; localStorage.setItem('user', JSON.stringify(data)); loadPosts(); });
    } else { loadPosts(); }
</script>
</body>
</html>
