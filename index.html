<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vikhrify</title>
    <link rel="manifest" href="/manifest.json">
    <style>
        :root { --bg: #ffffff; --card: #f8f9fa; --text: #000; --accent: #007bff; --border: #ddd; }
        [data-theme="dark"] { --bg: #0d1117; --card: #161b22; --text: #e6edf3; --accent: #58a6ff; --border: #30363d; }
        body { margin:0; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; overflow-x:hidden; }
        .hidden { display:none !important; }

        /* Auth */
        #auth-page { position:fixed; inset:0; background:var(--bg); z-index:10000; display:flex; align-items:center; justify-content:center; }
        .auth-card { background:var(--card); padding:30px; border-radius:20px; width:90%; max-width:350px; border:1px solid var(--border); text-align:center; }

        /* Header */
        header { position:fixed; top:0; width:100%; height:60px; background:var(--card); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 15px; z-index:1000; box-sizing:border-box; }
        
        /* Sidebar */
        #sidebar { position:fixed; top:0; left:-100%; width:280px; height:100%; background:var(--card); border-right:1px solid var(--border); transition:0.3s; z-index:2000; padding:20px; box-sizing:border-box; overflow-y:auto; }
        #sidebar.active { left:0; }
        .menu-item { padding:12px; border-radius:10px; cursor:pointer; font-weight:bold; margin-bottom:5px; transition: 0.2s; display:flex; align-items:center; gap:10px; }
        .menu-item:hover { background:var(--bg); }
        .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1500; display:none; }
        .overlay.active { display:block; }

        /* Content */
        .main-container { margin-top:70px; padding:15px; max-width:600px; margin-left:auto; margin-right:auto; padding-bottom:100px; }
        .post { background:var(--card); padding:15px; border-radius:15px; margin-bottom:15px; border:1px solid var(--border); }
        .avatar { width:45px; height:45px; border-radius:50%; object-fit:cover; background: #eee; }

        /* Profile */
        .profile-head { text-align:center; position:relative; padding:20px 0; }
        .add-story-btn { position:absolute; top:90px; right:38%; width:32px; height:32px; background:var(--accent); color:#fff; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; border:3px solid var(--bg); font-weight:bold; }
        
        input, button { width:100%; padding:12px; margin:8px 0; border-radius:10px; border:1px solid var(--border); background:var(--bg); color:var(--text); box-sizing:border-box; font-size:16px; }
        button { background:var(--accent); color:#fff; border:none; font-weight:bold; cursor:pointer; }
        
        .verified-blue::after { content:" ✔"; color:#1d9bf0; }
        .verified-yellow::after { content:" ✔"; color:#fbbc05; }
    </style>
</head>
<body data-theme="dark">

<div id="auth-page">
    <div class="auth-card">
        <h1>Vikhrify</h1>
        <div id="reg-box" class="hidden"><input id="auth-name" placeholder="Ваше Имя"></div>
        <input id="auth-u" placeholder="Username">
        <input id="auth-p" type="password" placeholder="Пароль">
        <button onclick="auth()">Войти / Создать</button>
        <p onclick="toggleAuth()" id="auth-toggle-text" style="cursor:pointer; font-size:14px; color:var(--accent); margin-top:10px">Нет аккаунта? Регистрация</p>
    </div>
</div>

<header>
    <div onclick="toggleMenu()" style="font-size:24px; cursor:pointer">☰</div>
    <div style="font-weight:bold; font-size:20px; letter-spacing:1px">Vikhrify</div>
    <div onclick="toggleTheme()" style="font-size:20px; cursor:pointer">🌓</div>
</header>

<div class="overlay" onclick="toggleMenu()"></div>
<div id="sidebar">
    <div style="font-size:24px; margin-bottom:20px; cursor:pointer" onclick="toggleMenu()">✕</div>
    <div class="menu-item" onclick="showSection('feed')">🏠 Главная</div>
    <div class="menu-item" onclick="showSection('search')">🔍 Поиск</div>
    <div class="menu-item" onclick="showSection('chats')">💬 Чаты</div>
    <div class="menu-item" onclick="showSection('shop')">🛒 Магазин</div>
    <div class="menu-item" onclick="showSection('profile')">👤 Профиль</div>
    
    <hr style="border:0.5px solid var(--border); margin:20px 0;">
    <div style="font-size: 12px; margin-left: 12px; color: var(--accent); margin-bottom:10px">МОИ АККАУНТЫ</div>
    <div id="accounts-list"></div>
    <div class="menu-item" onclick="addAccountAction()" style="color: var(--accent); font-size:14px">+ Добавить аккаунт</div>
    <div class="menu-item" onclick="logout()" style="color: #ff4444; font-size:14px">🚪 Выйти</div>
</div>

<div class="main-container">
    
    <div id="sec-feed" class="section">
        <div style="display:flex; gap:20px; margin-bottom:20px">
            <b onclick="loadPosts()" style="cursor:pointer; border-bottom:2px solid var(--accent)">Для вас</b>
            <span style="color:#888">Читаю</span>
        </div>
        <div id="feed-list"></div>
    </div>

    <div id="sec-search" class="section hidden">
        <input id="search-in" placeholder="Поиск по username..." oninput="searchUser()">
        <div id="search-results" style="margin-top:15px"></div>
    </div>

    <div id="sec-shop" class="section hidden">
        <h2>Магазин VXR</h2>
        <p>Курс: 1 VXR = 1 рубль</p>
        <div class="post"><b>100 VXR</b> - 100 руб <button onclick="window.open('tel:100')">Купить по звонку</button></div>
        <div class="post"><b>1 000 VXR</b> - 1000 руб <button onclick="window.open('tel:1000')">Купить по звонку</button></div>
        <div class="post"><b>10 000 VXR</b> - 10 000 руб <button onclick="window.open('tel:10000')">Купить по звонку</button></div>
    </div>

    <div id="sec-profile" class="section hidden">
        <div class="profile-head">
            <img id="p-avatar" class="avatar" style="width:100px; height:100px; border:2px solid var(--accent)">
            <div class="add-story-btn" onclick="alert('Загрузите фото для истории')">+</div>
            <h2 id="p-name"></h2>
            <p id="p-user" style="color:#888"></p>
            <p id="p-ref" style="font-size:12px; background:var(--card); padding:5px; border-radius:5px"></p>
            <button onclick="toggleEdit()">Редактировать профиль</button>
        </div>
        <div id="edit-box" class="hidden" style="margin-bottom:20px">
            <input id="edit-name-in" placeholder="Новое имя">
            <button onclick="saveProfile()">Сохранить изменения</button>
        </div>
        <hr style="border:0.5px solid var(--border)">
        <h3>Мои посты</h3>
        <div id="my-posts-list"></div>
    </div>

    <div id="sec-chats" class="section hidden">
        <h3>Ваши чаты</h3>
        <input id="chat-u-target" placeholder="Введите username">
        <button onclick="alert('Чат с пользователем создан!')">Начать новый чат</button>
    </div>

</div>

<script>
let accounts = JSON.parse(localStorage.getItem('vxr_accounts')) || [];
let user = JSON.parse(localStorage.getItem('user'));
let isLogin = true;

// PWA
if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/sw.js'); }

function toggleAuth() {
    isLogin = !isLogin;
    document.getElementById('reg-box').classList.toggle('hidden', isLogin);
    document.getElementById('auth-toggle-text').innerText = isLogin ? "Нет аккаунта? Регистрация" : "Уже есть аккаунт? Войти";
}

async function auth() {
    const username = document.getElementById('auth-u').value;
    const password = document.getElementById('auth-p').value;
    const name = document.getElementById('auth-name').value;
    
    const r = await fetch(isLogin ? '/api/login' : '/api/register', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({username, password, name})
    });
    const d = await r.json();
    
    if(d.success) {
        if(!isLogin) alert(d.message);
        // Мультиаккаунт логика
        if(!accounts.find(a => a.username === d.user.username)) {
            accounts.push(d.user);
            localStorage.setItem('vxr_accounts', JSON.stringify(accounts));
        }
        localStorage.setItem('user', JSON.stringify(d.user));
        location.reload();
    } else alert(d.error);
}

function toggleMenu() {
    document.getElementById('sidebar').classList.toggle('active');
    document.querySelector('.overlay').classList.toggle('active');
}

function toggleTheme() {
    const b = document.body;
    b.dataset.theme = b.dataset.theme === 'dark' ? 'light' : 'dark';
}

function showSection(id) {
    document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
    document.getElementById('sec-'+id).classList.remove('hidden');
    if(id === 'profile') loadProfile();
    if(id === 'feed') loadPosts();
    toggleMenu();
}

async function loadPosts() {
    const r = await fetch('/api/posts');
    const posts = await r.json();
    document.getElementById('feed-list').innerHTML = posts.map(p => `
        <div class="post">
            <div style="display:flex; gap:10px; align-items:center">
                <img src="${p.avatar}" class="avatar">
                <div><b>${p.name}</b><br><small>@${p.username}</small></div>
            </div>
            <p style="margin-top:10px">${p.content}</p>
        </div>
    `).join('');
}

function loadProfile() {
    document.getElementById('p-avatar').src = user.avatar;
    document.getElementById('p-name').innerText = user.name;
    document.getElementById('p-name').className = user.isVerified ? 'verified-' + user.isVerified : '';
    document.getElementById('p-user').innerText = '@' + user.username;
    document.getElementById('p-ref').innerText = 'Реф. ссылка: vikhrify.com/?ref=' + user.username;
    loadMyPosts();
}

async function loadMyPosts() {
    const r = await fetch('/api/posts?username=' + user.username);
    const posts = await r.json();
    document.getElementById('my-posts-list').innerHTML = posts.length ? posts.map(p => `
        <div class="post"><p>${p.content}</p></div>
    `).join('') : '<p style="color:#888">Постов пока нет</p>';
}

function toggleEdit() { document.getElementById('edit-box').classList.toggle('hidden'); }

function saveProfile() {
    const newName = document.getElementById('edit-name-in').value;
    if(newName) {
        user.name = newName;
        localStorage.setItem('user', JSON.stringify(user));
        // Также обновим в списке аккаунтов
        const idx = accounts.findIndex(a => a.username === user.username);
        if(idx !== -1) accounts[idx].name = newName;
        localStorage.setItem('vxr_accounts', JSON.stringify(accounts));
        loadProfile(); toggleEdit();
        alert("Имя изменено!");
    }
}

async function searchUser() {
    const q = document.getElementById('search-in').value;
    if(q.length < 2) return;
    const r = await fetch('/api/search?q=' + q);
    const users = await r.json();
    document.getElementById('search-results').innerHTML = users.map(u => `
        <div class="post" onclick="alert('Профиль @${u.username}')">
            <b>${u.name}</b> @${u.username}
        </div>
    `).join('');
}

// Функции мультиаккаунта
function renderAccounts() {
    const list = document.getElementById('accounts-list');
    list.innerHTML = accounts.map(a => `
        <div class="menu-item" onclick="switchAcc('${a.username}')" style="${a.username === user.username ? 'background:var(--bg); border-left:3px solid var(--accent)' : 'opacity:0.6'}">
            <img src="${a.avatar}" style="width:20px; height:20px; border-radius:50%"> ${a.name}
        </div>
    `).join('');
}

function switchAcc(un) {
    const target = accounts.find(a => a.username === un);
    if(target) { localStorage.setItem('user', JSON.stringify(target)); location.reload(); }
}

function addAccountAction() {
    document.getElementById('auth-page').classList.remove('hidden');
    toggleMenu();
}

function logout() {
    if(confirm("Выйти из этого аккаунта?")) {
        accounts = accounts.filter(a => a.username !== user.username);
        localStorage.setItem('vxr_accounts', JSON.stringify(accounts));
        if(accounts.length > 0) localStorage.setItem('user', JSON.stringify(accounts[0]));
        else localStorage.removeItem('user');
        location.reload();
    }
}

// Старт
if(user) {
    document.getElementById('auth-page').classList.add('hidden');
    renderAccounts();
    loadPosts();
}
</script>
</body>
</html>
