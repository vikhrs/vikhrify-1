<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vikhrify</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --text: #e6edf3; --accent: #58a6ff; --border: #30363d; }
        body { margin:0; font-family: sans-serif; background: var(--bg); color: var(--text); }
        .hidden { display:none !important; }
        header { position:fixed; top:0; width:100%; height:60px; background:var(--card); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 15px; z-index:1000; box-sizing:border-box; }
        #sidebar { position:fixed; top:0; left:-100%; width:280px; height:100%; background:var(--card); border-right:1px solid var(--border); transition:0.3s; z-index:2000; padding:20px; box-sizing:border-box; }
        #sidebar.active { left:0; }
        .main-container { margin-top:70px; padding:15px; max-width:600px; margin:70px auto 0; }
        .post { background:var(--card); padding:15px; border-radius:15px; margin-bottom:15px; border:1px solid var(--border); }
        .avatar { width:45px; height:45px; border-radius:50%; object-fit:cover; }
        .verified-blue::after { content:" ✔"; color:#1d9bf0; }
        .verified-yellow::after { content:" ✔"; color:#fbbc05; }
        input, textarea, button { width:100%; padding:12px; margin:8px 0; border-radius:10px; border:1px solid var(--border); background:var(--bg); color:var(--text); }
        .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1500; display:none; }
        .overlay.active { display:block; }
    </style>
</head>
<body>

<div id="auth-page">
    <div style="max-width:350px; margin:100px auto; padding:20px; background:var(--card); border-radius:20px; text-align:center">
        <h1>Vikhrify</h1>
        <div id="reg-box" class="hidden"><input id="auth-name" placeholder="Имя"></div>
        <input id="auth-u" placeholder="Username">
        <input id="auth-p" type="password" placeholder="Пароль">
        <button onclick="auth()">Войти</button>
        <p onclick="toggleAuth()" style="cursor:pointer; color:var(--accent)">Регистрация</p>
    </div>
</div>

<header>
    <div onclick="toggleMenu()" style="font-size:24px; cursor:pointer">☰</div>
    <div style="font-weight:bold; font-size:20px">Vikhrify</div>
    <div style="width:24px"></div>
</header>

<div class="overlay" onclick="toggleMenu()"></div>
<div id="sidebar">
    <div onclick="toggleMenu()" style="font-size:24px; margin-bottom:20px">✕</div>
    <div onclick="showSection('feed')">🏠 Главная</div>
    <div onclick="showSection('create')" style="color:var(--accent)">➕ Создать пост</div>
    <div onclick="showSection('search')">🔍 Поиск</div>
    <div onclick="showSection('profile')">👤 Профиль</div>
    <hr>
    <div style="font-size:12px; color:var(--accent)">АККАУНТЫ</div>
    <div id="acc-list"></div>
    <div onclick="addAccount()" style="color:var(--accent); cursor:pointer; padding:10px">+ Добавить аккаунт</div>
    <div onclick="logout()" style="color:red; cursor:pointer; padding:10px">🚪 Выйти</div>
</div>

<div class="main-container">
    <div id="sec-feed" class="section">
        <div style="display:flex; gap:20px; margin-bottom:15px">
            <b id="t-all" onclick="loadPosts('all')" style="cursor:pointer">Для вас</b>
            <b id="t-fol" onclick="loadPosts('following')" style="cursor:pointer">Вы читаете</b>
        </div>
        <div id="feed-list"></div>
    </div>

    <div id="sec-create" class="section hidden">
        <textarea id="p-text" placeholder="О чем думаете?"></textarea>
        <input type="file" id="p-file" accept="image/*">
        <button onclick="publish()">Опубликовать</button>
    </div>

    <div id="sec-search" class="section hidden">
        <input id="s-in" placeholder="Поиск брата..." oninput="doSearch()">
        <div id="s-res"></div>
    </div>

    <div id="sec-profile" class="section hidden">
        <center>
            <img id="p-img" class="avatar" style="width:100px; height:100px">
            <h2 id="p-name"></h2>
            <div id="p-bal" style="color:var(--accent)"></div>
            <p id="p-ref"></p>
            <input type="file" id="e-file" accept="image/*" onchange="updateAvatar()">
        </center>
    </div>
</div>

<script>
let user = JSON.parse(localStorage.getItem('user'));
let accounts = JSON.parse(localStorage.getItem('vxr_accs')) || [];
let isLogin = true;

function toggleAuth() { isLogin = !isLogin; document.getElementById('reg-box').classList.toggle('hidden', isLogin); }
function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); document.querySelector('.overlay').classList.toggle('active'); }

async function auth() {
    const u = document.getElementById('auth-u').value;
    const p = document.getElementById('auth-p').value;
    const n = document.getElementById('auth-name').value;
    const r = await fetch(isLogin ? '/api/login' : '/api/register', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({username: u, password: p, name: n})
    });
    const d = await r.json();
    if(d.success) {
        if(!accounts.find(a=>a.username === d.user.username)) accounts.push(d.user);
        localStorage.setItem('vxr_accs', JSON.stringify(accounts));
        localStorage.setItem('user', JSON.stringify(d.user));
        location.reload();
    } else alert(d.error);
}

function renderAccs() {
    document.getElementById('acc-list').innerHTML = accounts.map(a => `
        <div onclick="switchAcc('${a.username}')" style="padding:10px; cursor:pointer; ${a.username===user.username?'background:var(--border)':''}">
            <img src="${a.avatar}" style="width:20px; height:20px; border-radius:50%"> ${a.name}
        </div>`).join('');
}
function switchAcc(un) { localStorage.setItem('user', JSON.stringify(accounts.find(a=>a.username===un))); location.reload(); }
function addAccount() { document.getElementById('auth-page').classList.remove('hidden'); toggleMenu(); }
function logout() { 
    accounts = accounts.filter(a => a.username !== user.username);
    localStorage.setItem('vxr_accs', JSON.stringify(accounts));
    if(accounts.length > 0) localStorage.setItem('user', JSON.stringify(accounts[0]));
    else localStorage.removeItem('user');
    location.reload();
}

async function publish() {
    const content = document.getElementById('p-text').value;
    const file = document.getElementById('p-file').files[0];
    let image = "";
    if(file) {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = async () => {
            await fetch('/api/posts', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({userId: user.id, content, image: reader.result})
            });
            location.reload();
        };
    } else {
        await fetch('/api/posts', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({userId: user.id, content, image: ""})
        });
        location.reload();
    }
}

async function loadPosts(mode) {
    document.getElementById('t-all').style.color = mode==='all'?'var(--accent)':'#888';
    document.getElementById('t-fol').style.color = mode==='following'?'var(--accent)':'#888';
    const r = await fetch(`/api/posts?mode=${mode}&username=${user.username}`);
    const posts = await r.json();
    document.getElementById('feed-list').innerHTML = posts.map(p => `
        <div class="post">
            <img src="${p.avatar}" class="avatar"> <b class="${p.isVerified?'verified-'+p.isVerified:''}">${p.name}</b>
            <p>${p.content}</p>
            ${p.image ? `<img src="${p.image}" style="width:100%; border-radius:10px">` : ''}
        </div>`).join('');
}

async function doSearch() {
    const q = document.getElementById('s-in').value;
    const r = await fetch('/api/search?q='+q);
    const res = await r.json();
    document.getElementById('s-res').innerHTML = res.map(u => `
        <div class="post"><b>${u.name}</b> @${u.username} <button onclick="follow('${u.username}')">Подписаться</button></div>`).join('');
}

async function follow(un) {
    await fetch('/api/follow', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({myId: user.id, targetUsername: un})
    });
    alert('Готово!');
}

function showSection(id) {
    document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
    document.getElementById('sec-'+id).classList.remove('hidden');
    if(id === 'profile') {
        document.getElementById('p-img').src = user.avatar;
        document.getElementById('p-name').innerText = user.name;
        document.getElementById('p-name').className = user.isVerified ? 'verified-'+user.isVerified : '';
        document.getElementById('p-bal').innerText = `Баланс: ${user.balance} VXR`;
        document.getElementById('p-ref').innerText = `Ссылка: ${window.location.origin}/?ref=${user.username}`;
    }
    toggleMenu();
}

if(user) { document.getElementById('auth-page').classList.add('hidden'); renderAccs(); loadPosts('all'); }
</script>
</body>
</html>
