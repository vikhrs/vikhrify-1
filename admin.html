<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ Vikhrify</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background: #eee; }
    input { width: 80px; }
    button { margin: 2px; }
  </style>
</head>
<body>
  <h1>Админ-панель Vikhrify</h1>
  <p>Пароль для доступа: <input id="admin-pass" type="password" placeholder="Введите пароль"></p>
  <p>Пользователей: <span id="users-count">0</span> | Постов: <span id="posts-count">0</span> | Сообщений: <span id="msgs-count">0</span></p>

  <table id="users-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>@username</th>
        <th>Имя</th>
        <th>Баланс</th>
        <th>Премиум</th>
        <th>Статус</th>
        <th>Действия</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    const ADMIN_PASS = 'sehpy9-qiqjux-hofgyN'; // Тот же, что в server.js
    const tableBody = document.querySelector('#users-table tbody');

    async function loadAdmin() {
      const pass = document.getElementById('admin-pass').value;
      if (!pass) return alert('Введите пароль');

      const headers = { 'x-admin-pass': pass };

      const statsRes = await fetch('/api/admin/stats', { headers });
      if (!statsRes.ok) return alert('Неверный пароль');
      const stats = await statsRes.json();
      document.getElementById('users-count').textContent = stats.usersCount;
      document.getElementById('posts-count').textContent = stats.postsCount;
      document.getElementById('msgs-count').textContent = stats.msgsCount;

      const usersRes = await fetch('/api/admin/users', { headers });
      const users = await usersRes.json();

      tableBody.innerHTML = users.map(u => 
        <tr>
          <td>${u.id}</td>
          <td>@${u.username}</td>
          <td>${u.name}</td>
          <td><input type="number" value="\( {u.balance}" id="bal- \){u.id}"></td>
          <td>
            <select id="prem-${u.id}">
              <option value="none" ${u.premium === 'none' ? 'selected' : ''}>Нет</option>
              <option value="blue" ${u.premium === 'blue' ? 'selected' : ''}>Синяя (299)</option>
              <option value="yellow" ${u.premium === 'yellow' ? 'selected' : ''}>Жёлтая (499)</option>
              <option value="red" ${u.premium === 'red' ? 'selected' : ''}>Красная (админ)</option>
            </select>
          </td>
          <td>${u.isBlocked ? 'Заблокирован' : 'Активен'}</td>
          <td>
            <button onclick="updateUser(${u.id}, 'balance')">Сохранить баланс</button>
            <button onclick="updateUser(${u.id}, 'premium')">Сохранить премиум</button>
            <button onclick="toggleBlock(\( {u.id})"> \){u.isBlocked ? 'Разблокировать' : 'Заблокировать'}</button>
          </td>
        </tr>
      ).join('');
    }

    async function updateUser(id, field) {
      const pass = document.getElementById('admin-pass').value;
      const headers = { 'Content-Type': 'application/json', 'x-admin-pass': pass };
      let body = { id };
      if (field === 'balance') body.balance = Number(document.getElementById(bal-${id}).value);
      if (field === 'premium') body.premium = document.getElementById(prem-${id}).value;
      await fetch('/api/admin/user', { method: 'PATCH', headers, body: JSON.stringify(body) });
      alert('Обновлено');
    }

    async function toggleBlock(id) {
      const pass = document.getElementById('admin-pass').value;
      const headers = { 'Content-Type': 'application/json', 'x-admin-pass': pass };
      const user = (await fetch('/api/admin/users', { headers: { 'x-admin-pass': pass } })).json().then(us => us.find(u => u.id === id));
      await fetch('/api/admin/user', { method: 'PATCH', headers, body: JSON.stringify({ id, isBlocked: !user.isBlocked }) });
      loadAdmin();
    }
    document.getElementById('admin-pass').addEventListener('change', loadAdmin);
  </script>
</body>
</html>
