<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Админ-панель Vikhrify</title>
  <style>
    body { background:#0d1117; color:#fff; font-family:sans-serif; padding:20px; }
    .card { background:#161b22; border:1px solid #30363d; padding:20px; border-radius:12px; margin-bottom:20px; }
    table { width:100%; border-collapse:collapse; }
    th, td { padding:12px; border:1px solid #30363d; }
    input { background:#0d1117; color:#fff; border:1px solid #30363d; padding:5px; width:80px; }
  </style>
</head>
<body>
  <h1>Админ-панель Vikhrify 🛠</h1>
  <div style="display:flex; gap:20px; margin-bottom:20px">
    <div class="card">Юзеров: <b id="u-cnt">0</b></div>
    <div class="card">Постов: <b id="p-cnt">0</b></div>
  </div>
  <div class="card">
    <table>
      <thead><tr><th>Юзер</th><th>Пароль</th><th>VXR</th><th>Галочка</th><th>Действия</th></tr></thead>
      <tbody id="list"></tbody>
    </table>
  </div>
  <button onclick="clearPosts()" style="background:#da3633; color:#fff; padding:15px; width:100%; border:none; cursor:pointer">🗑 УДАЛИТЬ ВСЕ ПОСТЫ</button>

<script>
  const pass = prompt("Админ-пароль:");
  if(!pass) { document.body.innerHTML="<h1>Доступ закрыт</h1>"; throw ''; }
  const h = { 'x-admin-pass': pass, 'Content-Type': 'application/json' };

  async function load() {
    const resU = await fetch('/api/admin/users', {headers:h});
    const users = await resU.json();
    const resP = await fetch('/api/posts');
    const posts = await resP.json();
    
    document.getElementById('u-cnt').innerText = users.length;
    document.getElementById('p-cnt').innerText = posts.length;
    document.getElementById('list').innerHTML = users.map(u => `
      <tr>
        <td>@${u.username}</td>
        <td><input id="pw-${u.id}" value="${u.password}"> <button onclick="save(${u.id},'password')">ok</button></td>
        <td><input id="bl-${u.id}" value="${u.balance}"> <button onclick="save(${u.id},'balance')">ok</button></td>
        <td>
          <select id="vr-${u.id}" onchange="save(${u.id},'isVerified')">
            <option value="false" ${!u.isVerified?'selected':''}>Нет</option>
            <option value="blue" ${u.isVerified==='blue'?'selected':''}>Синяя</option>
            <option value="yellow" ${u.isVerified==='yellow'?'selected':''}>Золотая</option>
            <option value="red" ${u.isVerified==='red'?'selected':''}>Админ</option>
          </select>
        </td>
        <td><button onclick="save(${u.id},'isBlocked',${!u.isBlocked})">${u.isBlocked?'Разбан':'БАН'}</button></td>
      </tr>`).join('');
  }

  async function save(id, field, manualVal = null) {
    let val = manualVal;
    if(manualVal === null) {
        const el = document.getElementById(`${field.substring(0,2)}-${id}`);
        val = (field==='balance') ? Number(el.value) : el.value;
    }
    await fetch('/api/admin/user', {method:'PATCH', headers:h, body:JSON.stringify({id, [field]:val})});
    load();
  }

  async function clearPosts() { if(confirm("Удалить всё?")) { await fetch('/api/admin/clear-all-posts', {method:'POST', headers:h}); load(); } }
  load();
</script>
</body>
</html>
