<!DOCTYPE html>
<html>
<body style="background:#000; color:#fff; padding:20px;">
    <h1>Админ-панель</h1>
    <input id="p" class="input" type="password" placeholder="Пароль">
    <input id="q" oninput="render()" class="input" placeholder="Поиск по юзернейму...">
    <button class="btn" onclick="load()">Войти</button>
    <div id="list"></div>
    <script>
        let d = {users:[]};
        async function load() {
            const r = await fetch('/api/admin', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({pass: document.getElementById('p').value}) });
            d = await r.json(); render();
        }
        function render() {
            const q = document.getElementById('q').value.toLowerCase();
            document.getElementById('list').innerHTML = d.users.filter(u=>u.username.includes(q)).map(u => `
                <div style="border:1px solid #444; padding:15px; margin:10px 0;">
                    <b>${u.username}</b> ${u.badge ? '✔' : ''}<br>
                    <button onclick="act(${u.id}, 'ban')">Бан/Разбан</button>
                    <button onclick="act(${u.id}, 'badge')">Галочка</button>
                </div>`).join('');
        }
        async function act(uid, act) { 
            await fetch('/api/admin', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({pass: document.getElementById('p').value, uid, act}) });
            load(); 
        }
    </script>
</body>
</html>
