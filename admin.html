<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vikhrify | Admin Panel</title>
    <style>
        :root { 
            --bg: #0d1117; --card: #161b22; --border: #30363d; 
            --text: #e6edf3; --accent: #238636; --danger: #da3633; --info: #58a6ff;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        h1 { color: var(--info); border-bottom: 2px solid var(--border); padding-bottom: 10px; text-align: center; }
        
        .admin-container { max-width: 1000px; margin: 0 auto; }
        .main-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-top: 20px; }
        
        table { width: 100%; border-collapse: collapse; }
        th { background: #21262d; padding: 15px; text-align: left; border-bottom: 2px solid var(--border); font-size: 14px; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 14px; }
        
        input, select { background: var(--bg); color: white; border: 1px solid var(--border); padding: 6px; border-radius: 4px; width: 80px; }
        button { cursor: pointer; border: none; border-radius: 6px; padding: 8px 12px; font-weight: bold; transition: 0.2s; }
        .btn-save { background: var(--accent); color: white; }
        .btn-save:hover { opacity: 0.8; }
        
        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-info img { width: 30px; height: 30px; border-radius: 50%; }
        
        #status-msg { position: fixed; bottom: 20px; right: 20px; padding: 15px; border-radius: 8px; display: none; z-index: 100; }
        .success { background: var(--accent); color: white; }
    </style>
</head>
<body>

<div class="admin-container">
    <h1>Vikhrify Control Center 🛠</h1>
    
    <div class="main-card">
        <table>
            <thead>
                <tr>
                    <th>Пользователь</th>
                    <th>ID / Username</th>
                    <th>Баланс (VXR)</th>
                    <th>Статус (Галка)</th>
                    <th>Действие</th>
                </tr>
            </thead>
            <tbody id="admin-user-list">
                </tbody>
        </table>
    </div>
</div>

<div id="status-msg"></div>

<script>
    // Твой секретный пароль
    const adminKey = prompt("Введите ключ администратора Vikhrify:");
    
    async function loadUsers() {
        try {
            const response = await fetch('/api/admin/users', {
                headers: { 'x-admin-pass': adminKey }
            });
            
            if (response.status === 403) {
                alert("ОШИБКА: Неверный ключ администратора!");
                window.location.href = "/";
                return;
            }
            
            const users = await response.json();
            const tbody = document.getElementById('admin-user-list');
            
            tbody.innerHTML = users.map(u => `
                <tr>
                    <td>
                        <div class="user-info">
                            <img src="${u.avatar}">
                            <b>${u.name}</b>
                        </div>
                    </td>
                    <td><small>@${u.username}</small></td>
                    <td>
                        <input type="number" id="bal-${u.id}" value="${u.balance}">
                    </td>
                    <td>
                        <select id="ver-${u.id}">
                            <option value="false" ${u.isVerified === false ? 'selected' : ''}>Нет</option>
                            <option value="blue" ${u.isVerified === 'blue' ? 'selected' : ''}>Синяя</option>
                            <option value="yellow" ${u.isVerified === 'yellow' ? 'selected' : ''}>Золотая</option>
                        </select>
                    </td>
                    <td>
                        <button class="btn-save" onclick="saveUser(${u.id})">Применить</button>
                    </td>
                </tr>
            `).join('');
            
        } catch (e) {
            console.error(e);
            alert("Ошибка загрузки данных.");
        }
    }

    async function saveUser(id) {
        const balance = document.getElementById('bal-' + id).value;
        const isVerifiedInput = document.getElementById('ver-' + id).value;
        
        // Превращаем строку 'false' в булево значение, если нужно
        const isVerified = isVerifiedInput === 'false' ? false : isVerifiedInput;

        try {
            const res = await fetch('/api/admin/edit-user', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'x-admin-pass': adminKey 
                },
                body: JSON.stringify({ id, balance: Number(balance), isVerified })
            });

            if (res.ok) {
                showStatus("Данные пользователя обновлены!");
                loadUsers(); // Перезагружаем список
            }
        } catch (e) {
            alert("Ошибка при сохранении.");
        }
    }

    function showStatus(text) {
        const msg = document.getElementById('status-msg');
        msg.innerText = text;
        msg.className = 'success';
        msg.style.display = 'block';
        setTimeout(() => { msg.style.display = 'none'; }, 3000);
    }

    // Запуск при открытии
    if (adminKey) loadUsers();
</script>

</body>
</html>
