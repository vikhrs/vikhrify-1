<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Админ Vikhrify</title>
  <style>
    body { font-family:Arial; background:#0d1117; color:#e6edf3; padding:20px; }
    table { width:100%; border-collapse:collapse; background:#161b22; }
    th, td { border:1px solid #30363d; padding:12px; text-align:left; }
    input { background:#0d1117; color:white; border:1px solid #30363d; padding:5px; width:80px; }
    button { cursor:pointer; padding:5px 10px; margin:2px; }
  </style>
</head>
<body>
  <h1>Админ-панель</h1>
  <div id="stats"></div>
  <hr>
  <table>
    <thead>
      <tr>
        <th>Юзер</th>
        <th>Баланс VXR</th>
        <th>Подписчики</th>
        <th>Галочка</th>
        <th>Действия</th>
      </tr>
    </thead>
    <tbody id="user-list"></tbody>
  </table>

<script>
const pass = prompt("Пароль админа:");
const headers = { 'x-admin-pass': pass, 'Content-Type': 'application/json' };

async function load() {
  const r = await fetch('/api/admin/users', { headers });
  const users = await r.json();
  
  document.getElementById('user-list').innerHTML = users.map(u => `
    <tr>
      <td>@${u.username}</td>
      <td><input id="b-${u.id}" value="${u.balance}"> <button onclick="upd(${u.id}, 'balance')">OK</button></td>
      <td><input id="s-${u.id}" value="${u.followers || 0}"> <button onclick="upd(${u.id}, 'followers')">Накрутить</button></td>
      <td>
        <select id="v-${u.id}">
          <option value="false" ${!u.isVerified?'selected':''}>Нет</option>
          <option value="blue" ${u.isVerified==='blue'?'selected':''}>Blue</option>
          <option value="yellow" ${u.isVerified==='yellow'?'selected':''}>Gold</option>
          <option value="red" ${u.isVerified==='red'?'selected':''}>Admin</option>
        </select>
        <button onclick="upd(${u.id}, 'isVerified')">OK</button>
      </td>
      <td>
        <button onclick="upd(${u.id}, 'isBlocked', ${!u.isBlocked})" style="color:${u.isBlocked?'green':'red'}">${u.isBlocked?'Разбан':'БАН'}</button>
      </td>
    </tr>
  `).join('');
}

async function upd(id, field, manual) {
  let val = manual;
  if(field==='balance') val = Number(document.getElementById(`b-${id}`).value);
  if(field==='followers') val = Number(document.getElementById(`s-${id}`).value);
  if(field==='isVerified') val = document.getElementById(`v-${id}`).value;
  if(val === 'false') val = false;

  await fetch('/api/admin/user', { method:'PATCH', headers, body:JSON.stringify({ id, [field]:val }) });
  load();
}
load();
</script>
</body>
</html>
