<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ Vikhrify</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0d1117; color: #c9d1d9; padding: 20px; }
    h1 { color: #58a6ff; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #161b22; }
    th, td { border: 1px solid #30363d; padding: 10px; text-align: left; }
    th { background: #21262d; }
    input, select { background: #0d1117; color: #c9d1d9; border: 1px solid #30363d; padding: 6px; border-radius: 6px; }
    button { background: #238636; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; margin: 4px 2px; }
    button:hover { background: #2ea043; }
    .error { color: #f85149; font-weight: bold; }
    #status { margin: 12px 0; min-height: 24px; }
  </style>
</head>
<body>

  <h1>Админ-панель Vikhrify</h1>

  <label>Пароль админа:</label>
  <input id="admin-pass" type="password" placeholder="Введи пароль">
  <button onclick="loadData()">Загрузить / Обновить</button>

  <div id="status"></div>

  <p>Статистика: 
    Пользователей: <span id="users-count">—</span> | 
    Постов: <span id="posts-count">—</span> | 
    Сообщений: <span id="msgs-count">—</span>
  </p>

  <table id="users-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>@username</th>
        <th>Имя</th>
        <th>Баланс</th>
        <th>Премиум</th>
        <th>Статус</th>
        <th>Действия</th>
      </tr>
    </thead>
    <tbody id="users-body"></tbody>
  </table>

  <script>
    const ADMIN_PASS_HEADER = 'x-admin-pass';
    const ADMIN_PASS_VALUE = 'sehpy9-qiqjux-hofgyN'; // должен совпадать с server.js

    const statusEl = document.getElementById('status');
    const usersBody = document.getElementById('users-body');

    async function loadData() {
      const pass = document.getElementById('admin-pass').value.trim();
      if (!pass) {
        statusEl.innerHTML = '<span class="error">Введи пароль!</span>';
        return;
      }

      statusEl.innerHTML = 'Загрузка...';
      usersBody.innerHTML = '';

      try {
        const headers = { [ADMIN_PASS_HEADER]: pass };

        // Статистика
        const statsRes = await fetch('/api/admin/stats', { headers });
        if (!statsRes.ok) throw new Error(Ошибка ${statsRes.status}: ${await statsRes.text()});
        const stats = await statsRes.json();

        document.getElementById('users-count').textContent = stats.usersCount;
        document.getElementById('posts-count').textContent = stats.postsCount;
        document.getElementById('msgs-count').textContent = stats.msgsCount;

        // Пользователи
        const usersRes = await fetch('/api/admin/users', { headers });
        if (!usersRes.ok) throw new Error(Ошибка ${usersRes.status}: ${await usersRes.text()});
        const users = await usersRes.json();

        usersBody.innerHTML = users.map(user => `
          <tr data-user-id="${user.id}">
            <td>${user.id}</td>
            <td>@${user.username}</td>
            <td>${user.name || '—'}</td>
            <td>
              <input type="number" value="${user.balance || 0}" class="bal-input">
            </td>
            <td>
              <select class="prem-select">
                <option value="none" ${user.premium === 'none' ? 'selected' : ''}>Нет</option>
                <option value="blue" ${user.premium === 'blue' ? 'selected' : ''}>Синяя</option>
                <option value="yellow" ${user.premium === 'yellow' ? 'selected' : ''}>Жёлтая</option>
                <option value="red" ${user.premium === 'red' ? 'selected' : ''}>Красная (админ)</option>
              </select>
            </td>
            <td>${user.isBlocked ? '<span style="color:#f85149">Заблокирован</span>' : 'Активен'}</td>
            <td>
              <button onclick="saveBalance(${user.id})">Сохр. баланс</button>
              <button onclick="savePremium(${user.id})">Сохр. премиум</button>
              <button onclick="toggleBlock(${user.id})">
                ${user.isBlocked ? 'Разблокировать' : 'Заблокировать'}
              </button>
            </td>
          </tr>
        ).join('');

        statusEl.innerHTML = 'Данные загружены ✓';
      } catch (err) {
        console.error(err);
        statusEl.innerHTML = <span class="error">Ошибка: ${err.message}</span>;
      }
    }

    async function saveBalance(id) {
      const pass = document.getElementById('admin-pass').value.trim();
      const row = document.querySelector(tr[data-user-id="${id}"]);
      const balance = row.querySelector('.bal-input').value;

      try {
        const res = await fetch('/api/admin/user', {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json',
            [ADMIN_PASS_HEADER]: pass
          },
          body: JSON.stringify({ id: Number(id), balance: Number(balance) })
        });
        if (!res.ok) throw new Error(await res.text());
        alert('Баланс обновлён');
      } catch (err) {
        alert('Ошибка: ' + err.message);
      }
    }

    async function savePremium(id) {
      const pass = document.getElementById('admin-pass').value.trim();
      const row = document.querySelector(tr[data-user-id="${id}"]);
      const premium = row.querySelector('.prem-select').value;

      try {
        const res = await fetch('/api/admin/user', {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json',
            [ADMIN_PASS_HEADER]: pass
          },
          body: JSON.stringify({ id: Number(id), premium })
        });
        if (!res.ok) throw new Error(await res.text());
        alert('Премиум обновлён');
      } catch (err) {
        alert('Ошибка: ' + err.message);
      }
    }

    async function toggleBlock(id) {
      const pass = document.getElementById('admin-pass').value.trim();

      try {
        // Сначала получаем текущее состояние (чтобы инвертировать)
        const usersRes = await fetch('/api/admin/users', { headers: { [ADMIN_PASS_HEADER]: pass } });
        if (!usersRes.ok) throw new Error('Не удалось получить пользователей');
        const users = await usersRes.json();
        const user = users.find(u => u.id === id);
        if (!user) throw new Error('Пользователь не найден');

        const newBlocked = !user.isBlocked;

        const res = await fetch('/api/admin/user', {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json',
            [ADMIN_PASS_HEADER]: pass
          },
          body: JSON.stringify({ id: Number(id), isBlocked: newBlocked })
        });
        if (!res.ok) throw new Error(await res.text());

        alert(Пользователь ${newBlocked ? 'заблокирован' : 'разблокирован'}`);
        loadData(); // обновляем таблицу
      } catch (err) {
        alert('Ошибка: ' + err.message);
      }
    }

    // Автозагрузка при вводе пароля (Enter)
    document.getElementById('admin-pass').addEventListener('keypress', e => {
      if (e.key === 'Enter') loadData();
    });
  </script>
</body>
</html>
