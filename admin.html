<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel Vikhrify</title>
    <style>
        body { background: #0d1117; color: #e6edf3; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: #161b22; border: 1px solid #30363d; padding: 20px; border-radius: 12px; width: 100%; max-width: 600px; margin-top: 20px; }
        input, select { background: #0d1117; color: white; border: 1px solid #30363d; padding: 8px; border-radius: 6px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        button { background: #238636; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; }
        .user-item { border-bottom: 1px solid #30363d; padding: 15px 0; display: flex; flex-direction: column; gap: 5px; }
        .row { display: flex; gap: 10px; }
    </style>
</head>
<body>
    <h1>Панель управления</h1>

    <div id="login-form" class="card">
        <input type="password" id="admin-p" placeholder="Введите пароль админа">
        <button onclick="adminLogin()">Войти в систему</button>
    </div>

    <div id="admin-content" class="hidden" style="display:none; width: 100%; max-width: 600px;">
        <div id="users-list"></div>
    </div>

    <script>
        let currentPassword = "";

        async function adminLogin() {
            const pass = document.getElementById('admin-p').value;
            const r = await fetch('/api/admin/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({password: pass})
            });
            const d = await r.json();
            if(d.success) {
                currentPassword = pass;
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
                renderUsers(d.users);
            } else {
                alert("Ошибка: " + d.error);
            }
        }

        function renderUsers(users) {
            const list = document.getElementById('users-list');
            list.innerHTML = users.map(u => `
                <div class="card user-item">
                    <b>${u.name} (@${u.username})</b>
                    <div class="row">
                        <input type="number" id="b-${u.id}" value="${u.balance}" placeholder="Баланс">
                        <input type="number" id="l-${u.id}" value="${u.level}" placeholder="Уровень">
                    </div>
                    <select id="v-${u.id}">
                        <option value="false" ${!u.isVerified?'selected':''}>Нет галки</option>
                        <option value="blue" ${u.isVerified==='blue'?'selected':''}>Синяя галка</option>
                        <option value="yellow" ${u.isVerified==='yellow'?'selected':''}>Золотая галка</option>
                    </select>
                    <button onclick="saveUser(${u.id})">Обновить данные</button>
                </div>
            `).join('');
        }

        async function saveUser(id) {
            const data = {
                password: currentPassword,
                userId: id,
                balance: document.getElementById('b-'+id).value,
                level: document.getElementById('l-'+id).value,
                isVerified: document.getElementById('v-'+id).value
            };
            const r = await fetch('/api/admin/update', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            if(r.ok) alert("Данные юзера #" + id + " сохранены!");
            else alert("Ошибка сохранения");
        }
    </script>
</body>
</html>
