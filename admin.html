<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Админ Vikhrify</title>
  <style>
    body { font-family:Arial; background:#0d1117; color:#e6edf3; padding:20px; display:none; }
    table { width:100%; border-collapse:collapse; margin:20px 0; font-size:0.95rem; }
    th,td { border:1px solid #30363d; padding:10px; text-align:left; }
    th { background:#161b22; }
    button { padding:6px 12px; margin:3px; cursor:pointer; border-radius:6px; border:none; }
    input { padding:6px; background:#0d1117; color:#e6edf3; border:1px solid #30363d; border-radius:6px; }
    .btn-blue   { background:#1d9bf0; color:#000; }
    .btn-yellow { background:#fbbc05; color:#000; }
    .btn-red    { background:#ff0000; color:white; }
  </style>
</head>
<body>

  <h1>Админ-панель Vikhrify</h1>
  <p>Пользователей: <b id="uc">0</b> | Постов: <b id="pc">0</b></p>

  <input id="search" placeholder="Поиск по имени / @username / id..." oninput="filter()" style="width:400px; padding:10px; margin:16px 0;">

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>@username</th>
        <th>Имя</th>
        <th>Баланс</th>
        <th>Галочка</th>
        <th>Премиум до</th>
        <th>Подписчики</th>
        <th>Статус</th>
        <th>Действия</th>
      </tr>
    </thead>
    <tbody id="tbl"></tbody>
  </table>

  <button onclick="deleteAllPostsPrompt()" style="background:#ff4444; color:white; padding:10px 20px; margin:20px 0;">Удалить все посты пользователя...</button>

  <div style="margin-top:30px;">
    <button onclick="changeAdminPassword()" style="background:#0066cc; color:white; padding:12px 24px; font-size:1.1rem;">
      Сменить пароль админки
    </button>
  </div>

  <script>
  let currentAdminPass = null;

  // Запрос пароля при загрузке
  const enteredPass = prompt('Введите пароль администратора:');

  if (!enteredPass) {
    alert('Пароль обязателен');
    window.location.href = '/';
  } else {
    currentAdminPass = enteredPass;
    authenticate();
  }

  async function authenticate() {
    try {
      const r = await fetch('/api/admin/stats', {
        headers: { 'x-admin-pass': currentAdminPass }
      });

      if (!r.ok) throw new Error('Неверный пароль');

      document.body.style.display = 'block';
      const data = await r.json();
      document.getElementById('uc').textContent = data.usersCount;
      document.getElementById('pc').textContent = data.postsCount;

      loadUsers();
    } catch (e) {
      alert(e.message || 'Доступ запрещён');
      window.location.href = '/';
    }
  }

  async function loadUsers() {
    const headers = { 'x-admin-pass': currentAdminPass };
    const users = await (await fetch('/api/admin/users', { headers })).json();
    const tbody = document.getElementById('tbl');
    tbody.innerHTML = '';

    users.forEach(u => {
      let ver = '—';
      if (u.isVerified === 'blue')   ver = '<span style="color:#1d9bf0">синяя ✔</span>';
      if (u.isVerified === 'yellow') ver = '<span style="color:#fbbc05">жёлтая ✔</span>';
      if (u.isVerified === 'red')    ver = '<span style="color:#ff0000">красная ✔</span>';

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${u.id}</td>
        <td>@${u.username}</td>
        <td>${u.name}</td>
        <td>
          <input type="number" value="\( {u.balance}" id="bal \){u.id}" style="width:100px;">
          <button onclick="update(\( {u.id}, 'balance', document.getElementById('bal \){u.id}').value)">Сохранить</button>
        </td>
        <td>${ver}
          <button class="btn-blue"   onclick="update(${u.id}, 'isVerified', 'blue')">Синяя</button>
          <button class="btn-yellow" onclick="update(${u.id}, 'isVerified', 'yellow')">Жёлтая</button>
          <button class="btn-red"    onclick="update(${u.id}, 'isVerified', 'red')">Красная</button>
          <button onclick="update(${u.id}, 'isVerified', null)">Убрать</button>
        </td>
        <td>${u.premiumUntil ? new Date(u.premiumUntil).toLocaleDateString() : '—'}</td>
        <td>
          <input type="number" value="\( {(u.followers||[]).length}" id="fol \){u.id}" style="width:80px;">
          <button onclick="update(\( {u.id}, 'followersCount', document.getElementById('fol \){u.id}').value)">Установить</button>
        </td>
        <td>${u.isBlocked ? '🚫 Заблокирован' : 'Активен'}
          <button onclick="update(${u.id}, 'isBlocked', \( {!u.isBlocked})"> \){u.isBlocked ? 'Разблокировать' : 'Заблокировать'}</button>
        </td>
        <td>
          <button onclick="deleteAllPosts(${u.id})" style="background:#ff4444; color:white;">Удалить все посты</button>
        </td>
      `;
      tbody.appendChild(tr);
    });
  }

  async function update(id, field, val) {
    let body = { id };
    if (field === 'followersCount') {
      body.followersCount = Number(val);
    } else {
      body[field] = val === 'null' ? null : val;
    }

    await fetch('/api/admin/user', {
      method: 'PATCH',
      headers: { 
        'x-admin-pass': currentAdminPass,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });

    loadUsers();
  }

  async function deleteAllPosts(id) {
    if (!confirm('Удалить ВСЕ посты этого пользователя?')) return;
    await fetch('/api/admin/delete-posts', {
      method: 'POST',
      headers: { 
        'x-admin-pass': currentAdminPass,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ userId: id })
    });
    alert('Посты удалены');
    loadUsers();
  }

  function deleteAllPostsPrompt() {
    const id = prompt('ID пользователя, у которого удалить все посты:');
    if (id) deleteAllPosts(Number(id));
  }

  function filter() {
    const q = document.getElementById('search').value.toLowerCase();
    document.querySelectorAll('#tbl tr').forEach(tr => {
      tr.style.display = tr.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
  }

  async function changeAdminPassword() {
    const oldPass = prompt('Введите ТЕКУЩИЙ пароль админки:');
    if (oldPass !== currentAdminPass) {
      alert('Неверный текущий пароль');
      return;
    }

    const newPass = prompt('Новый пароль (минимум 6 символов):');
    if (!newPass || newPass.trim().length < 6) {
      alert('Пароль слишком короткий');
      return;
    }

    try {
      const r = await fetch('/api/admin/change-password', {
        method: 'POST',
        headers: { 
          'x-admin-pass': currentAdminPass,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ newPassword: newPass.trim() })
      });

      const data = await r.json();
      if (r.ok) {
        alert('Пароль изменён! Новый пароль: ' + newPass.trim() + '\nЗапомните его.');
        currentAdminPass = newPass.trim();
      } else {
        alert('Ошибка: ' + (data.error || 'Не удалось сменить пароль'));
      }
    } catch (e) {
      alert('Ошибка сети');
    }
  }
  </script>
</body>
</html>
