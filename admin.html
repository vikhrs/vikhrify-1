<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Admin Spy</title>
  <style>
    body { background:#0d1117; color:#fff; font-family:sans-serif; padding:20px; }
    table { width:100%; border-collapse:collapse; background:#161b22; }
    th, td { border:1px solid #30363d; padding:10px; }
    .spy-box { background:#0a0c10; padding:15px; border:1px solid #58a6ff; margin-top:20px; border-radius:10px; }
    .btn-ban { background:#da3633; color:#fff; border:none; padding:5px; cursor:pointer; }
  </style>
</head>
<body>
  <h1>Админ-панель шпионажа 🕵️‍♂️</h1>
  <table>
    <thead><tr><th>Юзер</th><th>VXR</th><th>Подписчики</th><th>Галочка</th><th>Бан</th><th>Шпионаж</th></tr></thead>
    <tbody id="list"></tbody>
  </table>

  <div id="spy" class="spy-box" style="display:none">
    <h3>Чат пользователя: <span id="spy-u"></span></h3>
    <div id="spy-content"></div>
    <button onclick="document.getElementById('spy').style.display='none'">Закрыть</button>
  </div>

  <button onclick="clearAll()" style="margin-top:20px; background:#da3633; color:#fff; width:100%; padding:15px">УДАЛИТЬ ВСЕ ПОСТЫ</button>

<script>
  const pass = prompt("Пароль:");
  const h = { 'x-admin-pass': pass, 'Content-Type': 'application/json' };

  async function load() {
    const r = await fetch('/api/admin/users', { headers: h });
    const users = await r.json();
    document.getElementById('list').innerHTML = users.map(u => `
      <tr>
        <td>@${u.username}</td>
        <td><input value="${u.balance}" onchange="upd(${u.id},'balance',this.value)" style="width:50px"></td>
        <td><input value="${u.followers}" onchange="upd(${u.id},'followers',this.value)" style="width:50px"></td>
        <td>
          <select onchange="upd(${u.id},'isVerified',this.value)">
            <option value="false" ${!u.isVerified?'selected':''}>Нет</option>
            <option value="blue" ${u.isVerified==='blue'?'selected':''}>Синяя</option>
            <option value="yellow" ${u.isVerified==='yellow'?'selected':''}>Золотая</option>
            <option value="red" ${u.isVerified==='red'?'selected':''}>Админ</option>
          </select>
        </td>
        <td><button class="btn-ban" onclick="upd(${u.id},'isBlocked',${!u.isBlocked})">${u.isBlocked?'Разбан':'БАН'}</button></td>
        <td><button onclick="spy('${u.username}')">👁 Читать</button></td>
      </tr>
    `).join('');
  }

  async function upd(id, field, val) {
    let v = val; if(field==='balance' || field==='followers') v = Number(val);
    if(val==='false') v = false;
    await fetch('/api/admin/user', { method:'PATCH', headers:h, body:JSON.stringify({id, [field]:v}) });
    load();
  }

  async function spy(un) {
    const r = await fetch(`/api/admin/user-messages?username=${un}`, { headers:h });
    const msgs = await r.json();
    document.getElementById('spy').style.display = 'block';
    document.getElementById('spy-u').innerText = un;
    document.getElementById('spy-content').innerHTML = msgs.map(m => `
      <div style="margin-bottom:5px"><b>${m.from} -> ${m.to}:</b> ${m.text} <small>(${new Date(m.date).toLocaleTimeString()})</small></div>
    `).join('') || 'Нет сообщений';
  }

  async function clearAll() { if(confirm("Удалить ВСЕ посты?")) fetch('/api/admin/clear-all-posts', {method:'POST', headers:h}).then(()=>load()); }
  load();
</script>
</body>
</html>
