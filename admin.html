<!DOCTYPE html>
<html>
<body style="background:#000; color:#fff; padding:20px;">
    <h1>Админка</h1>
    <input id="pass" type="password" placeholder="Пароль">
    <button onclick="getStats()">Статистика</button>
    <div id="content"></div>
    <script>
        async function getStats() {
            const res = await fetch('/api/admin', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({pass: document.getElementById('pass').value, action:'stats'}) });
            const data = await res.json();
            document.getElementById('content').innerText = `Пользователей: ${data.users}, Постов: ${data.posts}`;
        }
    </script>
</body>
</html>
