<!DOCTYPE html>
<html>
<body style="background:#000; color:#fff; padding:20px">
    <h1>Админка</h1>
    <input type="password" id="p" placeholder="Пароль">
    <button onclick="login()">Войти</button>
    <div id="list"></div>

    <script>
        let pass = "";
        async function login() {
            pass = document.getElementById('p').value;
            const r = await fetch('/api/admin/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password:pass}) });
            const d = await r.json();
            if(d.success) render(d.users);
        }
        function render(users) {
            document.getElementById('list').innerHTML = users.map(u => `
                <div>${u.username} <input id="b-${u.id}" value="${u.balance}"> <button onclick="save(${u.id})">Save</button></div>
            `).join('');
        }
        async function save(id) {
            await fetch('/api/admin/update', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password:pass, userId:id, balance:document.getElementById('b-'+id).value}) });
            alert('OK');
        }
    </script>
</body>
</html>
