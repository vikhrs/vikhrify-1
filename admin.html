<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Vikhrify Admin Panel</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        .card { border: 1px solid #333; padding: 20px; margin: 15px 0; border-radius: 10px; background: #111; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #444; background: #000; color: #fff; width: 250px; }
        button { padding: 12px 20px; background: #007bff; border: none; color: #fff; border-radius: 8px; cursor: pointer; }
        .msg { font-size: 14px; border-bottom: 1px solid #222; padding: 5px 0; }
    </style>
</head>
<body>
    <h1>Админ-панель Vikhrify</h1>
    
    <div id="login-box">
        <input type="password" id="p" placeholder="Пароль администратора">
        <button onclick="login()">Войти</button>
    </div>

    <div id="admin-dash" style="display:none">
        <h2 id="stats"></h2>
        <hr>
        <h2>Пользователи</h2>
        <div id="users-list"></div>
        <hr>
        <h2>История переписки (все сообщения)</h2>
        <div id="chats-list"></div>
    </div>

    <script>
        async function login() {
            const pass = document.getElementById('p').value;
            const res = await fetch('/api/admin/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({password: pass})
            });
            
            if (res.ok) {
                const data = await res.json();
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('admin-dash').style.display = 'block';
                render(data);
            } else {
                alert('Неверный пароль!');
            }
        }

        function render(data) {
            document.getElementById('stats').innerText = `Всего пользователей: ${data.users.length}`;
            
            document.getElementById('users-list').innerHTML = data.users.map(u => `
                <div class="card">
                    <b>${u.name} (@${u.username})</b> — ID: ${u.id}<br>
                    <button onclick="ban('${u.id}')">${u.isBlocked ? 'Разблокировать' : 'Заблокировать'}</button>
                </div>
            `).join('');

            // Декодируем Base64 в текст
            document.getElementById('chats-list').innerHTML = data.chats.map(c => `
                <div class="msg">
                    <b>${c.from} ➔ ${c.to}:</b> ${atob(c.text)}
                </div>
            `).join('');
        }

        async function ban(id) {
            // Тут вызов твоего API для изменения статуса
            alert('Функция бана работает через серверную логику (см. server.js)');
        }
    </script>
</body>
</html>
