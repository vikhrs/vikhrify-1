<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Vikhrify Admin</title></head>
<body style="background:#0d1117; color:white; font-family:sans-serif; padding:20px; display:flex; flex-direction:column; align-items:center">
    <h1>Админ Панель</h1>
    <div id="login-form" style="background:#161b22; padding:20px; border-radius:10px; border:1px solid #333">
        <input type="password" id="pass" placeholder="Пароль" style="padding:10px">
        <button onclick="login()" style="padding:10px; background:#238636; color:white; border:none; cursor:pointer">Войти</button>
    </div>
    <div id="content" style="display:none; width:100%; max-width:600px"></div>

    <script>
        let p = "";
        async function login() {
            p = document.getElementById('pass').value;
            const r = await fetch('/api/admin/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password:p}) });
            const d = await r.json();
            if(d.success) {
                document.getElementById('login-form').style.display='none';
                document.getElementById('content').style.display='block';
                render(d.users);
            } else alert('No');
        }
        function render(users) {
            document.getElementById('content').innerHTML = users.map(u => `
                <div style="background:#161b22; padding:15px; margin:10px; border-radius:10px; border:1px solid #333">
                    <b>${u.name}</b> (@${u.username})<br>
                    VXR: <input id="b-${u.id}" value="${u.balance}" style="width:60px">
                    Lvl: <input id="l-${u.id}" value="${u.level}" style="width:40px">
                    Галка: <select id="v-${u.id}">
                        <option value="false" ${!u.isVerified?'selected':''}>Нет</option>
                        <option value="blue" ${u.isVerified==='blue'?'selected':''}>Синяя</option>
                        <option value="yellow" ${u.isVerified==='yellow'?'selected':''}>Золотая</option>
                    </select>
                    <button onclick="save(${u.id})">Save</button>
                </div>`).join('');
        }
        async function save(id) {
            await fetch('/api/admin/update', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({password:p, userId:id, balance:document.getElementById('b-'+id).value, level:document.getElementById('l-'+id).value, isVerified:document.getElementById('v-'+id).value})
            });
            alert('Saved');
        }
    </script>
</body>
</html>
