<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ-панель Vikhrify</title>
  <style>
    :root { 
      --bg: #0d1117; --card: #161b22; --border: #30363d; 
      --text: #e6edf3; --accent: #238636; --danger: #da3633; --info: #58a6ff;
    }
    body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
    h1 { color: var(--info); border-bottom: 2px solid var(--border); padding-bottom: 10px; }
    
    .stats-row { display: flex; gap: 20px; margin-bottom: 25px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 12px; flex: 1; text-align: center; }
    .stat-card b { font-size: 24px; color: var(--info); }

    .main-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
    table { width: 100%; border-collapse: collapse; background: var(--card); }
    th { background: #21262d; padding: 15px; text-align: left; border-bottom: 2px solid var(--border); }
    td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 14px; }
    
    input, select { background: var(--bg); color: white; border: 1px solid var(--border); padding: 6px; border-radius: 4px; width: 90%; }
    button { cursor: pointer; border: none; border-radius: 6px; padding: 8px 12px; font-weight: bold; transition: 0.2s; }
    .btn-save { background: var(--accent); color: white; }
    .btn-save:hover { opacity: 0.8; }
    .btn-spy { background: var(--info); color: black; }
    .btn-chan { background: #fbbc05; color: black; }
    .btn-del { background: var(--danger); color: white; width: 100%; padding: 15px; font-size: 16px; margin-top: 20px; }

    #spy-modal { 
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 80%; max-width: 600px; background: var(--card); border: 2px solid var(--info);
      padding: 20px; border-radius: 15px; z-index: 1000; display: none; box-shadow: 0 0 50px rgba(0,0,0,0.8);
    }
    .spy-msgs { max-height: 400px; overflow-y: auto; background: #000; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
    .msg-line { margin-bottom: 8px; border-bottom: 1px solid #222; padding-bottom: 4px; }
  </style>
</head>
<body>

  <h1>Админ-панель Vikhrify 🛠</h1>

  <div class="stats-row">
    <div class="stat-card">Всего пользователей: <br><b id="u-count">0</b></div>
    <div class="stat-card">Всего постов: <br><b id="p-count">0</b></div>
  </div>

  <div class="main-card">
    <table>
      <thead>
        <tr>
          <th>Пользователь</th>
          <th>Пароль</th>
          <th>VXR (Баланс)</th>
          <th>LVL / XP</th>
          <th>Статус (Галка)</th>
          <th>Действия</th>
        </tr>
      </thead>
      <tbody id="user-list">
        </tbody>
    </table>
  </div>

  <button class="btn-del" onclick="deleteAllPosts()">🗑 УДАЛИТЬ ВСЕ ПОСТЫ ИЗ ЛЕНТЫ</button>

  <div id="spy-modal">
    <h3>Шпионаж за сообщениями: <span id="spy-user-title" style="color: var(--info);"></span></h3>
    <div class="spy-msgs" id="spy-content"></div>
    <button onclick="document.getElementById('spy-modal').style.display='none'" style="background: #555; color: white;">Закрыть</button>
  </div>

<script>
  const adminPass = prompt("Введите секретный ключ администратора:");
  if (!adminPass) {
    document.body.innerHTML = "<h1 style='color:red; text-align:center;'>ДОСТУП ЗАПРЕЩЕН</h1>";
    throw "Exit";
  }

  const headers = { 
    'x-admin-pass': adminPass, 
    'Content-Type': 'application/json' 
  };

  async function loadAdminData() {
    try {
      const resU = await fetch('/api/admin/users', { headers });
      if (!resU.ok) throw "Error";
      const users = await resU.json();

      const resP = await fetch('/api/posts');
      const posts = await resP.json();

      document.getElementById('u-count').innerText = users.length;
      document.getElementById('p-count').innerText = posts.length;

      const tbody = document.getElementById('user-list');
      tbody.innerHTML = users.map(u => `
        <tr>
          <td>
            <b>${u.name}</b><br>
            <small style="color: #8b949e">@${u.username}</small>
          </td>
          <td>
            <input type="text" id="pass-${u.id}" value="${u.password}">
            <button class="btn-save" onclick="updateField(${u.id}, 'password')">💾</button>
          </td>
          <td>
            <input type="number" id="bal-${u.id}" value="${u.balance}">
            <button class="btn-save" onclick="updateField(${u.id}, 'balance')">ok</button>
          </td>
          <td>
            Lvl: ${u.level || 1} <br> 
            <small>XP: ${u.xp || 0}</small>
          </td>
          <td>
            <select id="ver-${u.id}" onchange="updateField(${u.id}, 'isVerified')">
              <option value="false" ${!u.isVerified?'selected':''}>Нет</option>
              <option value="blue" ${u.isVerified==='blue'?'selected':''}>Синяя</option>
              <option value="yellow" ${u.isVerified==='yellow'?'selected':''}>Золотая</option>
              <option value="red" ${u.isVerified==='red'?'selected':''}>Админ</option>
            </select>
          </td>
          <td>
            <div style="display: flex; flex-direction: column; gap: 5px;">
              <button class="btn-spy" onclick="spyMessages('${u.username}')">👁 Чат</button>
              <button class="btn-chan" onclick="createChannel('${u.username}')">📢 Канал</button>
              <button style="background:${u.isBlocked?'var(--accent)':'var(--danger)'}; color:white;" onclick="updateField(${u.id}, 'isBlocked', ${!u.isBlocked})">
                ${u.isBlocked ? 'Разбан' : 'БАН'}
              </button>
            </div>
          </td>
        </tr>
      `).join('');
    } catch (e) {
      document.body.innerHTML = "<h1 style='color:red; text-align:center;'>НЕВЕРНЫЙ ПАРОЛЬ АДМИНИСТРАТОРА</h1>";
    }
  }

  async function updateField(id, field, manualValue = null) {
    let value = manualValue;
    if (manualValue === null) {
      const el = document.getElementById(`${field.substring(0,3)}-${id}`);
      value = (field === 'balance') ? Number(el.value) : (el.value === 'false' ? false : el.value);
    }
    
    await fetch('/api/admin/user', {
      method: 'PATCH',
      headers: headers,
      body: JSON.stringify({ id, [field]: value })
    });
    loadAdminData();
  }

  async function spyMessages(username) {
    const res = await fetch(`/api/admin/user-messages?username=${username}`, { headers });
    const msgs = await res.json();
    
    document.getElementById('spy-modal').style.display = 'block';
    document.getElementById('spy-user-title').innerText = '@' + username;
    document.getElementById('spy-content').innerHTML = msgs.map(m => `
      <div class="msg-line">
        <b style="color: ${m.from === username ? 'var(--info)' : 'var(--accent)'}">${m.from}</b> 
        ➜ <b>${m.to}</b>: <span>${m.text}</span>
      </div>
    `).join('') || "Сообщений пока нет.";
  }

  async function createChannel(username) {
    const title = prompt("Введите название канала для пользователя @" + username + ":");
    if (!title) return;
    
    const res = await fetch('/api/admin/create-channel', {
      method: 'POST',
      headers: headers,
      body: JSON.stringify({ ownerUsername: username, title })
    });
    
    if (res.ok) alert("Канал '" + title + "' успешно создан!");
  }

  async function deleteAllPosts() {
    if (confirm("ВНИМАНИЕ! Вы удалите ВСЕ посты мессенджера без возможности восстановления. Продолжить?")) {
      await fetch('/api/admin/clear-all-posts', { method: 'POST', headers });
      loadAdminData();
    }
  }

  // Запуск
  loadAdminData();
</script>
</body>
</html>
