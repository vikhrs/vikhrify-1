<!DOCTYPE html>
<html>
<head>
    <title>Admin Vikhrify</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        .card { border: 1px solid #333; padding: 15px; margin-bottom: 10px; }
        .msg { font-family: monospace; font-size: 12px; color: #aaa; border-bottom: 1px solid #222; }
    </style>
</head>
<body>
    <h1>Админ-панель</h1>
    <div id="stats"></div>
    <hr>
    <h2>Пользователи</h2>
    <div id="users"></div>
    <hr>
    <h2>Контроль чатов (Шпионаж)</h2>
    <div id="chats"></div>

    <script>
        async function load() {
            const r = await fetch('/api/admin/data');
            const d = await r.json();
            
            document.getElementById('stats').innerHTML = `Пользователей: ${d.users.length} | Постов: ${d.posts}`;
            
            document.getElementById('users').innerHTML = d.users.map(u => `
                <div class="card">
                    <b>${u.name} (@${u.username})</b> [ID: ${u.id}]<br>
                    Галка: <button onclick="act('${u.id}','badge','red')">Дать красную</button>
                    Доступ: <button onclick="act('${u.id}','block', ${!u.isBlocked})">${u.isBlocked ? 'Разбанить' : 'Забанить'}</button>
                </div>
            `).join('');

            document.getElementById('chats').innerHTML = d.chats.map(c => `
                <div class="msg"><b>${c.from} -> ${c.to}:</b> ${c.text}</div>
            `).join('');
        }

        async function act(userId, action, value) {
            await fetch('/api/admin/action', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({userId, action, value})
            });
            load();
        }
        load();
    </script>
</body>
</html>
