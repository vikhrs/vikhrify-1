<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Админ Vikhrify</title>
    <style>
        body { background: #0d1117; color: #fff; font-family: sans-serif; padding: 20px; }
        .card { background: #161b22; padding: 15px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; }
        input { background: #000; color: #fff; border: 1px solid #555; padding: 5px; width: 60px; }
    </style>
</head>
<body>
    <h1>Панель управления</h1>
    <div id="login-box">
        <input type="password" id="pass" placeholder="Пароль">
        <button onclick="auth()">Войти</button>
    </div>
    <div id="list"></div>

    <script>
        let password = "";
        async function auth() {
            password = document.getElementById('pass').value;
            try {
                const r = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({password})
                });
                const d = await r.json();
                if(d.success) {
                    document.getElementById('login-box').style.display = 'none';
                    render(d.users);
                } else {
                    alert('Неверный пароль');
                }
            } catch(e) { alert('Ошибка соединения с сервером'); console.error(e); }
        }

        function render(users) {
            document.getElementById('list').innerHTML = users.map(u => `
                <div class="card">
                    <b>${u.name}</b> (@${u.username})<br>
                    VXR: <input id="b-${u.id}" value="${u.balance}">
                    Lvl: <input id="l-${u.id}" value="${u.level}">
                    Галка: <select id="v-${u.id}">
                        <option value="false" ${!u.isVerified?'selected':''}>Нет</option>
                        <option value="blue" ${u.isVerified==='blue'?'selected':''}>Синяя</option>
                        <option value="yellow" ${u.isVerified==='yellow'?'selected':''}>Золотая</option>
                    </select>
                    <button onclick="save(${u.id})">Save</button>
                </div>
            `).join('');
        }

        async function save(id) {
            const body = {
                password,
                userId: id,
                balance: document.getElementById('b-'+id).value,
                level: document.getElementById('l-'+id).value,
                isVerified: document.getElementById('v-'+id).value
            };
            const r = await fetch('/api/admin/update', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body)
            });
            if(r.ok) alert('Успешно сохранено');
            else alert('Ошибка сохранения');
        }
    </script>
</body>
</html>
